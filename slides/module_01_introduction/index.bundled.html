@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

/* ===========================================
   CSS VARIABLES
   =========================================== */
:root {
  --background-color: #0a0e1a;
  --section-divider-bg: #0d1225;

  --heading-font: "Space Grotesk", Helvetica, sans-serif;
  --body-font: "Inter", Helvetica, sans-serif;
  --base-font-size: 32px;
  --text-size: 16pt;
  --h1-size: 48pt;
  --h2-size: 36pt;
  --h3-size: 24pt;
  --footnote-size: 11pt;

  --primary-color: #4a9eff;
  --secondary-color: #f5a623;
  --text-color: #e8eaf0;
  --muted-color: #8892a4;
  --line-color: #2a3450;

  --slide-padding: 60px;
  --slide-padding-top: 24px;
  --content-gap: 18px;

  --box-radius: 8px;
}

/* ===========================================
   BASE STYLES
   =========================================== */

.reveal {
  font-family: var(--body-font);
  font-size: var(--base-font-size);
}

.reveal strong,
.reveal b {
  font-weight: bold;
}

.reveal-viewport {
  background-color: var(--background-color);
}

.reveal-viewport.is-section-divider .slide-background.present {
  background-color: var(--section-divider-bg) !important;
}

.reveal h1,
.reveal h2,
.reveal h3,
.reveal h4,
.reveal h5,
.reveal h6 {
  font-family: var(--heading-font);
  text-transform: none;
  color: var(--text-color);
  font-weight: 600;
  line-height: 1.2;
}

.reveal h1 { font-size: var(--h1-size); }
.reveal h2 { font-size: var(--h2-size); margin-bottom: 0; }
.reveal h3 { font-size: var(--h3-size); }

.reveal p,
.reveal li,
.reveal td,
.reveal th,
.reveal blockquote {
  font-size: var(--text-size);
  color: var(--text-color);
  line-height: 1.5;
}

/* Vertical separation between newline-separated sentences on text slides.
   Scoped to a slide's top-level paragraphs (the prose flow); paragraphs
   nested inside components (terminal captions, figure cards, grid columns)
   keep their own tighter spacing so dense component slides do not overflow.
   Adjacent margins collapse, so the gap between two paragraphs is 0.9em. */
.reveal .slides section > p {
  margin: 0.4em 0 0.9em 0;
}

/* ===========================================
   LISTS
   =========================================== */

.reveal ul {
  list-style: none;
  padding-left: 0;
  margin: 15px 0;
}

.reveal ul li {
  position: relative;
  padding-left: 25px;
  margin-bottom: 10px;
}

.reveal ul li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0.6em;
  width: 8px;
  height: 8px;
  background: var(--primary-color);
  border-radius: 50%;
}

.reveal ul ul li::before {
  background: var(--muted-color);
  width: 6px;
  height: 6px;
}

.reveal blockquote p {
  font-size: inherit;
}

/* ===========================================
   SLIDE LAYOUT
   =========================================== */

.reveal .slides section {
  height: 100%;
  display: flex !important;
  flex-direction: column !important;
  padding: var(--slide-padding-top) var(--slide-padding) var(--slide-padding) var(--slide-padding) !important;
  box-sizing: border-box;
  text-align: left;
}

.reveal .slides section.stack {
  padding: 0 !important;
}

.reveal .slides section > .content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding-top: var(--content-gap);
  text-align: left;
}

.reveal .slides section > .footnote {
  position: absolute;
  bottom: 15px;
  left: var(--slide-padding);
  right: var(--slide-padding);
  font-size: var(--footnote-size);
  color: var(--muted-color);
}

/* ===========================================
   SECTION DIVIDERS
   =========================================== */

.reveal .slides section.section-divider {
  display: flex !important;
  flex-direction: column !important;
  justify-content: center !important;
  align-items: center !important;
  text-align: center;
}

.reveal .slides section.section-divider h1 {
  font-size: 56pt;
  text-align: center;
  color: var(--primary-color);
}

.reveal .slides section.section-divider p {
  font-size: 20pt;
  color: var(--muted-color);
}

/* ===========================================
   TEXT SIZE UTILITIES
   =========================================== */

.text-lg { font-size: 18pt !important; }
.text-xl { font-size: 20pt !important; }
.text-2xl { font-size: 24pt !important; }
.text-3xl { font-size: 28pt !important; }
.text-4xl { font-size: 32pt !important; }

.text-muted { color: var(--muted-color) !important; }
.text-center { text-align: center !important; }
.text-uppercase { text-transform: uppercase; letter-spacing: 0.1em; }
.font-light { font-weight: 300; }
.font-bold { font-weight: 600; }

/* ===========================================
   BLOCKQUOTES
   =========================================== */

.reveal blockquote {
  border-left: 4px solid var(--primary-color);
  padding-left: 20px;
  margin: 20px 0;
  font-style: italic;
  background: none;
  box-shadow: none;
  width: 100%;
  max-width: none;
}

.reveal blockquote cite {
  display: block;
  margin-top: 10px;
  font-style: normal;
  color: var(--muted-color);
}

/* ===========================================
   ACCENT UNDERLINE ON TITLES
   =========================================== */

.reveal .slides section > h2 {
  flex-shrink: 0;
  margin: 0;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--line-color);
}

/* ===========================================
   FIGURE CARD - for notable figures slides
   =========================================== */

.figure-card {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 40px;
  align-items: start;
}

.figure-card img {
  border-radius: var(--box-radius);
  width: 100%;
  box-shadow: 0 4px 20px rgba(74, 158, 255, 0.15);
}

.figure-card .figure-info h3 {
  margin: 0 0 5px 0;
  color: var(--secondary-color);
  font-size: 14pt;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* ===========================================
   ERA BADGE - for timeline labels
   =========================================== */

.era-badge {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 12pt;
  font-weight: 500;
}

.era-badge.summer {
  background: rgba(245, 166, 35, 0.2);
  color: var(--secondary-color);
}

.era-badge.winter {
  background: rgba(74, 158, 255, 0.15);
  color: #6cb4ff;
}

.era-badge.spring {

  color: #50c878;
}

/* ===========================================
   HIGHLIGHT BOX

.highlight-box {
  background: rgba(74, 158, 255, 0.08);

/* Exercise hint: a single fragment that reveals the whole hint at once.

  font-size: 18pt;
  margin: 0;
}

/* ===========================================

.course-summary {
  max-width: 1120px;
  margin: 0 0 16px 0;
  color: #f0f4fb;
  font-size: 18pt !important;
  line-height: 1.4 !important;
}

.course-track-grid {

.module-track-card {
  background: rgba(74, 158, 255, 0.07);
  border: 1px solid rgba(74, 158, 255, 0.22);

}

.module-track-kicker {
  font-size: 12pt;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--secondary-color);

}

.module-track-card h3 {
  margin: 0 0 8px 0;
}

.module-track-intro {
  font-size: 14pt !important;
  color: #d7ddea !important;
  margin: 0 0 10px 0;
  line-height: 1.4 !important;
}

.compact-list {

}

.reveal ul.compact-list li {
  font-size: 16pt;
  line-height: 1.35;
  margin-bottom: 7px;
  padding-left: 20px;
}

.course-note {
  margin-top: 14px;

.course-glossary {
  display: grid;
  grid-template-columns: 1fr 1fr;

}

.glossary-item {
  background: rgba(245, 166, 35, 0.08);
  border: 1px solid rgba(245, 166, 35, 0.18);
  border-radius: var(--box-radius);
  padding: 12px 14px;
}

.glossary-item strong {
  color: var(--secondary-color);
}

.glossary-item p {
  font-size: 13pt !important;

}

/* ===========================================
   TERMINAL OUTPUT
   =========================================== */

.terminal-output {
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 0;
  max-width: 800px;
  margin: 0 auto;
  text-align: left;
}

.terminal-output .terminal-bar {
  background: #161b22;
  border-radius: 8px 8px 0 0;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.terminal-output .terminal-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
}

.terminal-output .terminal-dot.red { background: #ff5f57; }
.terminal-output .terminal-dot.yellow { background: #febc2e; }
.terminal-output .terminal-dot.green { background: #28c840; }

.terminal-output .terminal-title {
  color: #8b949e;

}

.terminal-output .terminal-body {
  padding: 15px 20px;
}

.terminal-output .terminal-body pre {
  margin: 0;
  background: none !important;
  box-shadow: none !important;
}

.reveal .terminal-output .terminal-body pre.terminal-pre {
  font-size: 11pt;
  line-height: 1.5;
  color: #e8eaf0;
  background: none !important;
  padding: 0;
  box-shadow: none !important;
  font-family: monospace;
}

.reveal .terminal-output .terminal-body pre code {
  font-size: 11pt;

  box-shadow: none !important;

}

.terminal-output .terminal-body .prompt {

}

.terminal-output .terminal-body .header {

}

/* ===========================================

.turning-point h2 {

   CODE BLOCKS

/* ===========================================

.video-container {

.video-container video,

/* ===========================================
   TERMINAL OUTPUT - ANSI COLOR PALETTE

   =========================================== */

.terminal-output .terminal-body .t-red    { color: #e06c75; }
.terminal-output .terminal-body .t-orange { color: #d19a66; }
.terminal-output .terminal-body .t-yellow { color: #e5c07b; }

.terminal-output .terminal-body .t-fg     { color: #e8eaf0; }

.terminal-caption {

/* ===========================================
   TIMELINE (module 1) - per-node structure
   Positional left/width and per-era colors stay
   inline; this captures the repeated boilerplate.
   =========================================== */

.tl-node  { position: absolute; transform: translateX(-50%); text-align: center; }
/* .reveal prefix needed: `.reveal p` (0,1,1) sets color/font-size and would
   otherwise beat a bare .tl-* class. The original used inline styles. */
.reveal .tl-label { font-size: 10pt; color: var(--muted-color); white-space: nowrap; margin: 0; }
.reveal .tl-year  { font-size: 11pt; font-weight: 600; margin: 2px 0 0 0; }
.tl-stem  { width: 1px; opacity: 0.5; margin: 2px auto 0; }
.tl-dot   { width: 10px; height: 10px; border-radius: 50%; margin: 0 auto; }

.tl-node.below .tl-stem  { margin: 0 auto; }
.tl-node.below .tl-year  { margin: 0; }
.tl-node.below .tl-label { margin: 2px 0 0 0; }

/* ===========================================
   CANONICAL SLIDE TYPES
   Backs the :::divider / :::columns / :::note /
   :::quiz / :::step / :::interactive fences so
   slides.md carries no inline layout styles.
   (.section-divider, .figure-card, .terminal-output,
    .hint-box are defined above and reused.)
   =========================================== */

/* :::columns - grid; template/gap/valign supplied by the build */
.reveal .slide-columns {
  display: grid;
  align-items: start;
  margin: 10px 0;
}

/* :::note - callout box (canonical replacement for .highlight-box) */
.reveal .note {
  background: rgba(74, 158, 255, 0.08);
  border: 1px solid rgba(74, 158, 255, 0.25);
  border-radius: var(--box-radius);
  padding: 20px 25px;
  margin: 20px 0;
}

.reveal .note p {
  font-size: 18pt;
  margin: 0;
}

.reveal .note p + p {
  margin-top: 0.6em;
}

/* :::note variant="hint" - lighter, boxless (also used inside :::step) */
.reveal .note.hint-box {
  background: none;
  border: none;
  padding: 0;
}

/* :::quiz - prompt scales up; its last line is the question */
.reveal .quiz-prompt p {
  font-size: 18pt;
  margin: 0 0 0.6em 0;
}

.reveal .quiz-prompt p:last-child {
  font-size: 24pt;
  color: var(--text-color);
  margin: 0.5em 0 0 0;
}

.reveal .quiz-answer {
  margin-top: 30px;
}

/* :::step - spacing between code, hint, and answer */
.reveal .hint-box {
  margin-top: 22px;
}

.reveal .hint-box + .note {
  margin-top: 12px;
}

/* :::interactive - widget fills the slide body like a video */
.reveal .interactive-host {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 0;
  width: 100%;
}

/* ===========================================
   FOLDING WIDGET  (:::interactive widget="folding")
   Linked input-space / hidden-space views with
   per-neuron weight & bias sliders.
   =========================================== */

.fold-widget {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 100%;
  height: 100%;
}

.fold-views {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
  flex: 1;
  min-height: 0;
}

.fold-view {
  display: flex;
  flex-direction: column;
  margin: 0;
  min-height: 0;
}

.reveal .fold-view figcaption {
  font-size: 14pt;
  color: var(--primary-color);
  font-weight: 600;
  text-align: center;
  margin-bottom: 6px;
}

.fold-canvas {
  flex: 1;
  min-height: 0;
  width: 100%;
  background: #0d1225;
  border: 1px solid var(--line-color);
  border-radius: var(--box-radius);
}

.fold-controls {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.fold-modes {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.fold-modes button {
  font-family: var(--body-font);
  font-size: 13pt;
  color: var(--text-color);
  background: rgba(74, 158, 255, 0.10);
  border: 1px solid rgba(74, 158, 255, 0.35);
  border-radius: 6px;
  padding: 6px 14px;
  cursor: pointer;
}

.fold-modes button.active {
  background: var(--primary-color);
  border-color: var(--primary-color);
  color: #0a0e1a;
  font-weight: 600;
}

.fold-modes button.fold-reset {
  background: rgba(245, 166, 35, 0.12);
  border-color: rgba(245, 166, 35, 0.40);
  color: var(--secondary-color);
}

.fold-sliders {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px 24px;
}

.fold-slider {
  display: grid;
  grid-template-columns: 70px 1fr 52px;
  align-items: center;
  gap: 10px;
}

.reveal .fold-slider label {
  font-size: 12pt;
  margin: 0;
  font-family: var(--body-font);
  font-weight: 600;
}

.fold-slider input[type="range"] {
  width: 100%;
  accent-color: var(--primary-color);
}

.reveal .fold-slider .fold-val {
  font-size: 12pt;
  color: var(--text-color);
  font-family: monospace;
  text-align: right;
  margin: 0;
}

.reveal .fold-readout {
  font-size: 13pt;
  color: var(--muted-color);
  text-align: center;
  margin: 0;
}

.reveal .fold-readout strong {
  color: var(--secondary-color);
}

# LLMs 0 to 100

Module 1: Course Introduction

From Shannon to ChatGPT

---

<div class="figure-card">

![Grace Hopper](images/hopper.jpg)

<div class="figure-info">

## Grace Hopper <!-- .element: class="fragment fade-in" -->

<div class="fragment fade-in">

### Pioneered the First Compiler

- Created the A-0 System (1952) &mdash; the first compiler
- Believed computers should speak human languages, not the other way around
- Led development of COBOL &mdash; programs written in near-English
- Rear Admiral in the U.S. Navy
- **LLMs are the next step:** natural language compilers that translate plain text into tasks

## Course Structure

<div class="content">

The course has four module groups: foundations, training, applications, and evaluation. <!-- .element: class="text-xl course-summary" -->

<div class="course-track-grid">
<div class="module-track-card">
<div class="module-track-kicker">Modules 1-4</div>

### Foundations

Concepts and vocabulary. <!-- .element: class="module-track-intro" -->

- **1. Introduction** &mdash; information theory and n-gram models
- **2. Perceptrons** &mdash; the simplest neural network
- **3. Attention** &mdash; deciding which earlier words matter

## Information Theory (1940s-50s)

- **Shannon** proved communication could be quantified in *bits*
- Any signal can be transmitted reliably through a noisy channel
- Gave us a formal way to think about **language as information**
- **Von Neumann's** stored-program architecture made general computation possible
- Together: the theoretical bedrock for everything that follows

> "The fundamental problem of communication is that of reproducing at one point either exactly or approximately a message selected at another point."
>
> &mdash; Claude Shannon, 1948

<!-- .slide: id="chain-rule" -->

## The Chain Rule of Probability

How do we compute the probability of an entire sequence $P(w_1, w_2, \ldots, w_n)$? <!-- .element: class="text-lg" -->

$$P(w_1 w_2 \ldots w_n) = \prod_{k=1}^{n} P(w_k \mid w_1 \ldots w_{k-1})$$

This decomposes a joint probability into a product of conditional probabilities. But we still need to estimate $P(w_k \mid w_1 \ldots w_{k-1})$, and we cannot count occurrences of every possible history. <!-- .element: class="text-lg" -->

---

<!-- .slide: id="markov-assumption" -->

## The Markov Assumption

Instead of conditioning on the **entire** history, approximate with just the last few symbols: <!-- .element: class="text-lg" -->

$$P(w_k \mid w_1 \ldots w_{k-1}) \approx P(w_k \mid w_{k-n+1} \ldots w_{k-1})$$

For example, instead of computing: <!-- .element: class="text-lg" -->

$P(\texttt{blue} \mid \texttt{The water of Walden Pond is so beautifully})$

A bigram approximates this as: <!-- .element: class="text-lg" -->

$P(\texttt{blue} \mid \texttt{beautifully})$ <!-- .element: style="color: var(--secondary-color);" -->

This is the core trade-off of n-gram models: more context is better, but the data becomes sparser. <!-- .element: class="text-muted" style="font-size: 13pt;" -->

---

<!-- .slide: id="ngram-models" -->

## N-gram Model Estimation

Given the Markov assumption, we estimate each conditional probability by counting: <!-- .element: class="text-lg" -->

$$P(c_t \mid c_{t-n+1}, \ldots, c_{t-1}) = \frac{\text{count}(c_{t-n+1} \ldots c_t)}{\text{count}(c_{t-n+1} \ldots c_{t-1})}$$

- **Uniform random:** $P(c) = \frac{1}{27}$
- **Unigram:** $P(c) = \frac{\text{count}(c)}{\text{total characters}}$
- **Bigram:** $P(c_t \mid c_{t-1})$
- **Trigram:** $P(c_t \mid c_{t-2}, c_{t-1})$

Shannon described this exact procedure in 1948. Let's build it ourselves. <!-- .element: class="text-muted" style="font-size: 13pt;" -->

---

<!-- .slide: id="entropy" -->

## Shannon Entropy

How many bits do we need, on average, to encode a symbol? <!-- .element: class="text-lg" -->

$$H(X) = -\sum_{i} p(x_i) \log_2 p(x_i)$$

For a **uniform** distribution over 27 characters, every $p(x_i) = \frac{1}{27}$: <!-- .element: class="text-lg" -->

$$H = -\sum_{i=1}^{27} \tfrac{1}{27} \log_2 \tfrac{1}{27} = -27 \cdot \tfrac{1}{27} \cdot \log_2 \tfrac{1}{27} = \log_2(27) = 4.75 \text{ bits/char}$$

- This is the **maximum entropy** for 27 symbols. Any structure in the distribution lowers it.
- English text: $H \approx 1.0\text{--}1.5$ bits/char (Shannon, 1951). Most of each character is **predictable** from context.
- The gap (4.75 vs ~1.2) = the **redundancy** that makes language models possible.
<!-- .element: class="text-lg" -->

---

<!-- .slide: id="cross-entropy" -->

## Cross-Entropy

How well does a **model** $q$ predict text? For each character in the corpus, ask: how many bits does the model need to encode it? <!-- .element: class="text-lg" -->

$$H(q) = -\frac{1}{N} \sum_{i=1}^{N} \log_2 q(c_i \mid \text{context}_i)$$

This is the average number of bits per character the model needs. For each character $c_i$, the model assigns a probability $q(c_i \mid \text{context})$. Higher probability = fewer bits ($-\log_2$ of a large number is small). <!-- .element: class="text-lg" -->

**Perplexity** converts this to an intuitive scale: <!-- .element: class="text-lg" -->

$$\text{Perplexity} = 2^{H(q)}$$

A perplexity of 10 means the model is as uncertain as choosing uniformly from 10 options. Lower = better. <!-- .element: class="text-muted" style="font-size: 13pt;" -->

## Step 5: Generating from the Model

Now that we have a table of "given context X, character Y appears Z times," we can **generate** text. Start with a seed, look up the context, sample the next character proportionally, repeat. <!-- .element: class="text-lg" -->

This is exactly what Shannon described in 1948 — and it is conceptually the same process used by modern language models, just with far more context and parameters. <!-- .element: class="text-lg" style="margin-top: 15px;" -->

        if context in model:

            weights = list(counter.values())

## Extra Credit

If you finish early, try the optional extra credit: <!-- .element: class="text-lg" -->

- **`cross_entropy()`** &mdash; measure how surprised the model is: $H(p, q) = -\frac{1}{N} \sum \log_2 q(c_i \mid \text{context})$
- **`perplexity()`** &mdash; convert to perplexity: $\text{PPL} = 2^{H(p,q)}$, a standard metric for language models

Lower perplexity = better model. You should see perplexity drop as you increase the n-gram order. This is the same metric used to evaluate GPT and other modern LLMs. <!-- .element: class="text-lg" style="margin-top: 15px;" -->

<!-- .slide: id="quiz-q1" -->

## Q1: Why Not Just Use Rules?

<div class="quiz-prompt">

GOFAI systems used hand-written rules to process language. Why did this approach ultimately fail for general language understanding? <!-- .element: class="text-lg" -->

</div>

<div class="fragment note quiz-answer">

**Answer:** Language is inherently ambiguous and context-dependent. You cannot enumerate rules for every possible meaning of every word in every context. "Bank" alone has dozens of meanings, and the rules would need to cover all of them and all their interactions. Statistical/learned models discover these patterns from data instead of requiring manual specification. <!-- .element: class="text-lg" -->

</div>

---

<!-- .slide: id="quiz-q2" -->

## Q2: Shannon's Entropy

<div class="quiz-prompt">

Shannon estimated English has $H \approx 1.0\text{--}1.5$ bits/char. A uniform 27-character alphabet has $H = \log_2(27) = 4.75$ bits/char. <!-- .element: class="text-lg" -->

What does this gap tell us about English as a communication system? <!-- .element: class="text-2xl" style="margin-top: 20px;" -->

</div>

<div class="fragment note quiz-answer">

**Answer:** English is highly redundant. About 70-80% of each character is predictable from context. This redundancy is what makes autocomplete, spell-check, and language models possible, and it is why you can read text with missing letters. Shannon showed this redundancy is a measurable, mathematical property. <!-- .element: class="text-lg" -->

</div>

---

<!-- .slide: id="quiz-q3" -->

## Q3: The Memorization Problem

<div class="quiz-prompt">

A word-level 5-gram model trained on *Alice in Wonderland* produces output that is mostly exact quotes from the book. <!-- .element: class="text-lg" -->

Why does this happen, and how do modern LLMs avoid it? <!-- .element: class="text-2xl" style="margin-top: 20px;" -->

</div>

<div class="fragment note quiz-answer">

**Answer:** With high-order n-grams and limited training data, most contexts appear only once, so the model can only reproduce the original. Modern LLMs avoid this by (1) training on vastly more data, (2) using continuous representations instead of exact count tables, and (3) generalizing across similar contexts via learned embeddings. <!-- .element: class="text-lg" -->

</div>

---

<!-- .slide: id="quiz-q4" -->

## Q4: Conditional Probability

<div class="quiz-prompt">

A trigram model trained on English text has these counts for the context "th": <!-- .element: class="text-lg" -->

```python
model["th"] = Counter({"e": 50, "a": 20, "i": 15, "o": 10, "u": 5})
```

What is $P(\texttt{e} \mid \texttt{th})$, and what does it mean for the model's behavior? <!-- .element: class="text-2xl" style="margin-top: 20px;" -->

</div>

<div class="fragment note quiz-answer">

**Answer:** $P(\texttt{e} \mid \texttt{th}) = \frac{50}{50+20+15+10+5} = \frac{50}{100} = 0.5$. Half the time the model encounters the context "th", it will generate "e" as the next character. This is a conditional probability: it only applies when "th" is already the context. The other half of the time, the model generates "a" (20%), "i" (15%), "o" (10%), or "u" (5%). This is why trigram output produces "the" so frequently, but also generates "tha", "thi", and other combinations. <!-- .element: class="text-lg" -->

</div>

---

<!-- .slide: id="quiz-q5" -->

## Q5: Compression and Prediction

<div class="quiz-prompt">

Shannon proved that a perfect language model would also be a perfect compressor, and vice versa. <!-- .element: class="text-lg" -->

Why are prediction and compression fundamentally the same problem? <!-- .element: class="text-2xl" style="margin-top: 20px;" -->

</div>

<div class="fragment note quiz-answer">

**Answer:** If you can predict the next symbol with high confidence, you need fewer bits to encode it: a symbol with probability $p$ requires $-\log_2(p)$ bits. A model that predicts perfectly ($p = 1$) needs 0 bits. Conversely, any compression scheme implicitly defines a probability model over the next symbol. Shannon's source coding theorem formalizes this: the minimum average code length equals the entropy $H(X)$. <!-- .element: class="text-lg" -->

</div>

    };
  }

  function drawFrame(ctx, w, h, pad, xr, yr, xlab, ylab) {
    ctx.clearRect(0, 0, w, h);
    ctx.strokeStyle = LINEC; ctx.lineWidth = 1;
    ctx.strokeRect(pad, pad, w - 2 * pad, h - 2 * pad);
    var m = makeMapper(w, h, xr, yr, pad);
    // zero axes if visible
    ctx.strokeStyle = 'rgba(136,146,164,0.35)';
    if (xr[0] < 0 && xr[1] > 0) {
      var zx = m(0, yr[0])[0];
      ctx.beginPath(); ctx.moveTo(zx, pad); ctx.lineTo(zx, h - pad); ctx.stroke();
    }
    if (yr[0] < 0 && yr[1] > 0) {
      var zy = m(xr[0], 0)[1];
      ctx.beginPath(); ctx.moveTo(pad, zy); ctx.lineTo(w - pad, zy); ctx.stroke();
    }
    ctx.fillStyle = MUTED; ctx.font = '12px Inter, sans-serif';
    ctx.textAlign = 'right'; ctx.fillText(xlab, w - pad - 4, h - pad - 6);
    ctx.textAlign = 'left'; ctx.save();
    ctx.translate(pad + 4, pad + 4); ctx.fillText(ylab, 0, 8); ctx.restore();
    return m;
  }

  function dot(ctx, px, py, color, r) {
    ctx.beginPath(); ctx.arc(px, py, r || 4.5, 0, 6.2832);
    ctx.fillStyle = color; ctx.globalAlpha = 0.9; ctx.fill(); ctx.globalAlpha = 1;
  }

  // Hidden coords for a point: (h1, h2[, h3]) via ReLU(Wx+b).
  function hidden(p) {
    return state.neurons.map(function(n) {
      return relu(n.w1 * p.x + n.w2 * p.y + n.b);
    });
  }

  function draw() {
    // ---- Input space (left): data + each neuron's decision line ----
    var fi = fitCanvas(inCanvas);
    if (fi) {
      var pad = 26, xr = [-0.5, 1.5], yr = [-0.5, 1.5];
      var m = drawFrame(fi.ctx, fi.w, fi.h, pad, xr, yr, 'x₁', 'x₂');
      var ctx = fi.ctx;
      ctx.save();
      ctx.beginPath();
      ctx.rect(pad, pad, fi.w - 2 * pad, fi.h - 2 * pad);
      ctx.clip();
      state.neurons.forEach(function(n, idx) {
        var a = n.w1, b = n.w2, c = n.b, p0, p1;
        if (Math.abs(b) > 1e-9) {
          p0 = m(xr[0], -(a * xr[0] + c) / b);
          p1 = m(xr[1], -(a * xr[1] + c) / b);
        } else if (Math.abs(a) > 1e-9) {
          p0 = m(-c / a, yr[0]); p1 = m(-c / a, yr[1]);
        } else { return; }
        ctx.strokeStyle = NEURON_COLORS[idx];
        ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.moveTo(p0[0], p0[1]); ctx.lineTo(p1[0], p1[1]); ctx.stroke();
      });
      data.forEach(function(p) {
        var q = m(p.x, p.y);
        dot(ctx, q[0], q[1], p.cls ? GREEN : RED);
      });
      ctx.restore();
    }

    // ---- Hidden space (right): folded points + centroid separator ----
    var fh = fitCanvas(hidCanvas);
    if (!fh) { return; }
    var H = data.map(function(p) { return { h: hidden(p), cls: p.cls }; });
    var k = state.k;
    // project to 2D: K=1 uses (h1, jitter); K>=2 uses (h1, h2)
    var pts = H.map(function(o, i) {
      if (k === 1) return { x: o.h[0], y: ((i % 7) - 3) * 0.12, cls: o.cls };
      return { x: o.h[0], y: o.h[1], cls: o.cls };
    });
    var xs = pts.map(function(p) { return p.x; });
    var ys = pts.map(function(p) { return p.y; });
    function span(arr) {
      var lo = Math.min.apply(null, arr), hi = Math.max.apply(null, arr);
      if (hi - lo < 1e-6) { lo -= 0.5; hi += 0.5; }
      var pd = (hi - lo) * 0.12;
      return [lo - pd, hi + pd];
    }
    var hxr = span(xs), hyr = k === 1 ? [-1, 1] : span(ys);
    var pad2 = 26;
    var mh = drawFrame(fh.ctx, fh.w, fh.h, pad2, hxr, hyr,
                       'h₁', k === 1 ? '' : 'h₂');
    var ctx2 = fh.ctx;

    // Pocket perceptron (Rosenblatt): guaranteed to find a separating
    // line when one exists, and keeps the best line seen otherwise --
    // exactly what "linearly separable" means, and on-topic for this
    // module. Updates are scaled by `sc` only for numeric stability.
    var oneD = (k === 1);
    var sc = 1;
    pts.forEach(function(p) {
      sc = Math.max(sc, Math.abs(p.x), oneD ? 0 : Math.abs(p.y));
    });
    function lineAcc(W) {
      var c = 0;
      pts.forEach(function(p) {
        var s = (W.wx * p.x + (oneD ? 0 : W.wy * p.y) + W.b) >= 0 ? 1 : 0;
        if (s === p.cls) c++;
      });
      return c;
    }
    var cur = { wx: 0, wy: 0, b: 0 };
    var sw = { wx: 0, wy: 0, b: 0 };
    var best = lineAcc(sw);
    for (var ep = 0; ep < 400 && best < pts.length; ep++) {
      pts.forEach(function(p) {
        var s = (cur.wx * p.x + (oneD ? 0 : cur.wy * p.y) + cur.b) >= 0 ? 1 : 0;
        var e = p.cls - s; // -1, 0, or +1
        if (e !== 0) {
          cur.wx += e * p.x / sc;
          if (!oneD) cur.wy += e * p.y / sc;
          cur.b += e / sc;
        }
      });
      var s2 = lineAcc(cur);
      if (s2 > best) { best = s2; sw.wx = cur.wx; sw.wy = cur.wy; sw.b = cur.b; }
    }
    var acc = best / pts.length;

    ctx2.save();
    ctx2.beginPath();
    ctx2.rect(pad2, pad2, fh.w - 2 * pad2, fh.h - 2 * pad2);
    ctx2.clip();
    if (Math.abs(sw.wx) + Math.abs(sw.wy) > 1e-6) {
      // decision line sw.wx*x + sw.wy*y + sw.b = 0, clipped to frame
      var e0, e1;
      if (!oneD && Math.abs(sw.wy) > 1e-6) {
        e0 = mh(hxr[0], -(sw.wx * hxr[0] + sw.b) / sw.wy);
        e1 = mh(hxr[1], -(sw.wx * hxr[1] + sw.b) / sw.wy);
      } else {
        var xv = -sw.b / sw.wx;
        e0 = mh(xv, hyr[0]); e1 = mh(xv, hyr[1]);
      }
      ctx2.strokeStyle = SECON; ctx2.lineWidth = 2;
      ctx2.setLineDash([7, 6]);
      ctx2.beginPath(); ctx2.moveTo(e0[0], e0[1]); ctx2.lineTo(e1[0], e1[1]); ctx2.stroke();
      ctx2.setLineDash([]);
    }
    pts.forEach(function(p) {
      var q = mh(p.x, p.y);
      dot(ctx2, q[0], q[1], p.cls ? GREEN : RED);
    });
    ctx2.restore();

    var sep = acc > 0.999;
    readoutEl.innerHTML =
      'Straight-line separator in hidden space: <strong>' +
      (acc * 100).toFixed(0) + '%</strong> &mdash; ' +
      (sep ? 'the fold made the classes linearly separable'
           : 'still entangled: one flat cut cannot split them yet');
  }

  buildSliders();
  modeBtns.forEach(function(b) {
    b.classList.toggle('active', +b.getAttribute('data-neurons') === state.k);
  });

  return { resize: draw };
};

// ---- Per-module hooks (from MODULE_CONFIG) ----
if (MODULE_CONFIG.title) document.title = MODULE_CONFIG.title;
if (MODULE_CONFIG.widgets) Object.assign(INTERACTIVE_WIDGETS, MODULE_CONFIG.widgets);
if (typeof MODULE_CONFIG.onReady === 'function') {
  Reveal.on('ready', function() { MODULE_CONFIG.onReady(Reveal); });
}
if (typeof MODULE_CONFIG.onSlideChanged === 'function') {
  Reveal.on('slidechanged', function(event) { MODULE_CONFIG.onSlideChanged(event); });
}

  </script>
</body>
</html>
