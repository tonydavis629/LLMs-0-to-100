<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLMs 0 to 100 - Module 1</title>

  <!-- Reveal.js core -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reset.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">

  <!-- Syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css">

  <!-- KaTeX math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}, {left: '\\(', right: '\\)', display: false}]});"></script>

  <!-- Custom styles -->
  <link rel="stylesheet" href="styles.css">

  <!-- Chart.js for data visualization -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <section data-markdown="slides.md"
               data-separator="^\n---\n$"
               data-separator-vertical="^\n--\n$"
               data-separator-notes="^Note:">
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
  <script>
    // ---- Manim section step-through player ----
    // Section video lists are inline to avoid fetch() issues with file:// protocol.
    var MANIM_SECTIONS = {
    };

    var manimSteppers = {};

    function initManimStepper(video) {
      var scene = video.getAttribute('data-manim-scene');
      var sections = MANIM_SECTIONS[scene] || [];
      var state = { sections: sections, current: -1, playing: false, video: video, scene: scene };
      manimSteppers[scene] = state;

      // Set poster frame from first section
      if (sections.length > 0) {
        video.src = 'media/sections/' + sections[0];
        video.load();
      }

      video.addEventListener('ended', function() {
        state.playing = false;
      });
    }

    function advanceManimStepper(scene) {
      var state = manimSteppers[scene];
      if (!state || state.playing) return false;
      if (state.current >= state.sections.length - 1) return false;

      state.current++;
      state.playing = true;
      var file = state.sections[state.current];
      state.video.src = 'media/sections/' + file;
      state.video.load();
      state.video.play().then(function() {}).catch(function() { state.playing = false; });
      return true;
    }

    function resetManimStepper(scene) {
      var state = manimSteppers[scene];
      if (!state) return;
      state.current = -1;
      state.playing = false;
      state.video.pause();
      if (state.sections.length > 0) {
        state.video.src = 'media/sections/' + state.sections[0];
        state.video.load();
      }
    }

    // ---- Initialize Reveal.js ----
    Reveal.initialize({
      width: 1280,
      height: 720,
      margin: 0,
      controls: true,
      progress: true,
      slideNumber: false,
      hash: true,
      transition: 'slide',
      center: false,
      autoAnimateDuration: 0.8,
      plugins: [ RevealHighlight, RevealMarkdown ]
    });

    function initStepperClickHandlers() {
      document.querySelectorAll('.manim-stepper').forEach(function(video) {
        if (video.dataset.clickInit) return;
        video.dataset.clickInit = '1';
        video.style.cursor = 'pointer';
        video.addEventListener('click', function(e) {
          var scene = video.getAttribute('data-manim-scene');
          advanceManimStepper(scene);
          e.stopPropagation();
          e.preventDefault();
        });
      });
    }

    function initAllSteppers() {
      document.querySelectorAll('.manim-stepper').forEach(function(v) {
        if (!manimSteppers[v.getAttribute('data-manim-scene')]) {
          initManimStepper(v);
        }
      });
      initStepperClickHandlers();
    }

    function renderMath() {
      if (typeof renderMathInElement !== 'undefined') {
        renderMathInElement(document.body, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false},
            {left: '\\(', right: '\\)', display: false}
          ]
        });
      }
    }

    // reveal-markdown loads slides asynchronously, so the 'ready' event may
    // fire before the markdown content is in the DOM. Poll briefly.
    Reveal.on('ready', function() {
      var tries = 0;
      var iv = setInterval(function() {
        tries++;
        if (document.querySelectorAll('section').length > 5 || tries > 20) {
          clearInterval(iv);
          initAllSteppers();
          renderMath();
        }
      }, 100);
    });

    // Reset steppers when leaving a slide
    Reveal.on('slidechanged', function(event) {
      initAllSteppers();
      Object.keys(manimSteppers).forEach(function(scene) {
        if (!event.currentSlide.querySelector('[data-manim-scene="' + scene + '"]')) {
          resetManimStepper(scene);
        }
      });
    });

    // Intercept right arrow / space / enter on manim slides to step through sections
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') {
        var currentSlide = Reveal.getCurrentSlide();
        var stepper = currentSlide ? currentSlide.querySelector('.manim-stepper') : null;
        if (stepper) {
          var scene = stepper.getAttribute('data-manim-scene');
          if (advanceManimStepper(scene)) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        }
      }
    }, true);

    // ---- AI Summers and Winters chart ----
    Reveal.on('slidechanged', function(event) {
      if (event.currentSlide.id === 'summers-winters') {
        var canvas = document.getElementById('hypeChart');
        if (canvas && !canvas._chartCreated) {
          canvas._chartCreated = true;
          // Custom plugin to draw labeled vertical lines (more reliable than annotation plugin on category axes)
          var eventLinesPlugin = {
            id: 'eventLines',
            afterDraw: function(chart) {
              var ctx = chart.ctx;
              var xScale = chart.scales.x;
              var yScale = chart.scales.y;
              var events = [
                { label: 'Dartmouth\nWorkshop', year: '1956', color: '#f5a623' },
                { label: 'Lighthill\nReport', year: '1974', color: '#6cb4ff' },
                { label: 'Expert\nSystems', year: '1984', color: '#f5a623' },
                { label: '2nd AI\nWinter', year: '1993', color: '#6cb4ff' },
                { label: 'AlexNet', year: '2012', color: '#50c878' },
                { label: 'Transformers', year: '2017', color: '#f5a623' },
                { label: 'LLM Era', year: '2024', color: '#f5a623' }
              ];
              events.forEach(function(ev) {
                var labelIdx = chart.data.labels.indexOf(ev.year);
                if (labelIdx === -1) return;
                var x = xScale.getPixelForValue(labelIdx);
                var yTop = yScale.top;
                var yBottom = yScale.bottom;
                // Dashed vertical line
                ctx.save();
                ctx.setLineDash([4, 4]);
                ctx.strokeStyle = ev.color;
                ctx.globalAlpha = 0.5;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(x, yTop);
                ctx.lineTo(x, yBottom);
                ctx.stroke();
                ctx.restore();
                // Label at top
                ctx.save();
                ctx.font = '10px Inter, sans-serif';
                ctx.fillStyle = ev.color;
                ctx.textAlign = 'center';
                var lines = ev.label.split('\n');
                for (var i = 0; i < lines.length; i++) {
                  ctx.fillText(lines[i], x, yTop - (lines.length - i) * 12 + 10);
                }
                ctx.restore();
              });
            }
          };
          new Chart(canvas.getContext('2d'), {
            type: 'line',
            plugins: [eventLinesPlugin],
            data: {
              labels: [
                '1950', '1953', '1956', '1958', '1960', '1963', '1965', '1968',
                '1970', '1972', '1974', '1976', '1978', '1980', '1982', '1984',
                '1986', '1988', '1990', '1993', '1996', '2000', '2004', '2008',
                '2012', '2014', '2016', '2017', '2018', '2019', '2020', '2021',
                '2022', '2023', '2024'
              ],
              datasets: [{
                label: 'AI Hype / Investment',
                data: [
                  10, 30, 75, 70, 65, 55, 50, 35,
                  25, 18, 10, 8, 10, 35, 50, 65,
                  70, 50, 35, 18, 15, 20, 22, 28,
                  50, 55, 65, 75, 85, 95, 110, 140,
                  200, 320, 500
                ],
                borderColor: '#4a9eff',
                backgroundColor: 'rgba(74, 158, 255, 0.08)',
                fill: true,
                tension: 0.4,
                pointRadius: 0,
                borderWidth: 2.5
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              animation: { duration: 1200 },
              layout: { padding: { top: 30 } },
              scales: {
                x: {
                  title: { display: true, text: 'Year', color: '#8892a4', font: { size: 13 } },
                  ticks: { color: '#8892a4', maxTicksLimit: 12, font: { size: 11 } },
                  grid: { color: 'rgba(42, 52, 80, 0.5)' }
                },
                y: {
                  title: { display: true, text: 'Hype / Investment', color: '#8892a4', font: { size: 13 } },
                  ticks: { display: false },
                  grid: { color: 'rgba(42, 52, 80, 0.5)' },
                  min: 0,
                  max: 550
                }
              },
              plugins: {
                legend: { display: false }
              }
            }
          });
        }
      }
    });
  </script>
</body>
</html>
