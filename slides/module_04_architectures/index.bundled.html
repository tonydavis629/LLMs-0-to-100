<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLMs 0 to 100</title>

  <!-- Reveal.js core -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reset.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">

  <!-- Syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css">

  <!-- KaTeX math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}, {left: '\\(', right: '\\)', display: false}]});"></script>

  <!-- Module-specific <head> includes (e.g. Chart.js); empty for most modules -->
  

  <!-- Shared styles + per-module overrides, inlined by the build -->
  <style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

/* ===========================================
   CSS VARIABLES
   =========================================== */
:root {
  --background-color: #0a0e1a;
  --section-divider-bg: #0d1225;

  --heading-font: "Space Grotesk", Helvetica, sans-serif;
  --body-font: "Inter", Helvetica, sans-serif;
  --base-font-size: 32px;
  --text-size: 16pt;
  --h1-size: 48pt;
  --h2-size: 36pt;
  --h3-size: 24pt;
  --footnote-size: 11pt;

  --primary-color: #4a9eff;
  --secondary-color: #f5a623;
  --text-color: #e8eaf0;
  --muted-color: #8892a4;
  --line-color: #2a3450;

  --slide-padding: 60px;
  --slide-padding-top: 24px;
  --content-gap: 18px;

  --box-radius: 8px;
}

/* ===========================================
   BASE STYLES
   =========================================== */

.reveal {
  font-family: var(--body-font);
  font-size: var(--base-font-size);
}

.reveal strong,
.reveal b {
  font-weight: bold;
}

.reveal-viewport {
  background-color: var(--background-color);
}

.reveal-viewport.is-section-divider .slide-background.present {
  background-color: var(--section-divider-bg) !important;
}

.reveal h1,
.reveal h2,
.reveal h3,
.reveal h4,
.reveal h5,
.reveal h6 {
  font-family: var(--heading-font);
  text-transform: none;
  color: var(--text-color);
  font-weight: 600;
  line-height: 1.2;
}

.reveal h1 { font-size: var(--h1-size); }
.reveal h2 { font-size: var(--h2-size); margin-bottom: 0; }
.reveal h3 { font-size: var(--h3-size); }

.reveal p,
.reveal li,
.reveal td,
.reveal th,
.reveal blockquote {
  font-size: var(--text-size);
  color: var(--text-color);
  line-height: 1.5;
}

/* Vertical separation between newline-separated sentences on text slides.
   Scoped to a slide's top-level paragraphs (the prose flow); paragraphs
   nested inside components (terminal captions, figure cards, grid columns)
   keep their own tighter spacing so dense component slides do not overflow.
   Adjacent margins collapse, so the gap between two paragraphs is 0.9em. */
.reveal .slides section > p {
  margin: 0.4em 0 0.9em 0;
}

/* ===========================================
   LISTS
   =========================================== */

.reveal ul {
  list-style: none;
  padding-left: 0;
  margin: 15px 0;
}

.reveal ul li {
  position: relative;
  padding-left: 25px;
  margin-bottom: 10px;
}

.reveal ul li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0.6em;
  width: 8px;
  height: 8px;
  background: var(--primary-color);
  border-radius: 50%;
}

.reveal ul ul li::before {
  background: var(--muted-color);
  width: 6px;
  height: 6px;
}

.reveal blockquote p {
  font-size: inherit;
}

/* ===========================================
   SLIDE LAYOUT
   =========================================== */

.reveal .slides section {
  height: 100%;
  display: flex !important;
  flex-direction: column !important;
  padding: var(--slide-padding-top) var(--slide-padding) var(--slide-padding) var(--slide-padding) !important;
  box-sizing: border-box;
  text-align: left;
}

.reveal .slides section.stack {
  padding: 0 !important;
}

.reveal .slides section > .content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding-top: var(--content-gap);
  text-align: left;
}

.reveal .slides section > .footnote {
  position: absolute;
  bottom: 15px;
  left: var(--slide-padding);
  right: var(--slide-padding);
  font-size: var(--footnote-size);
  color: var(--muted-color);
}

/* ===========================================
   SECTION DIVIDERS
   =========================================== */

.reveal .slides section.section-divider {
  display: flex !important;
  flex-direction: column !important;
  justify-content: center !important;
  align-items: center !important;
  text-align: center;
}

.reveal .slides section.section-divider h1 {
  font-size: 56pt;
  text-align: center;
  color: var(--primary-color);
}

.reveal .slides section.section-divider p {
  font-size: 20pt;
  color: var(--muted-color);
}

/* ===========================================
   TEXT SIZE UTILITIES
   =========================================== */

.text-lg { font-size: 18pt !important; }
.text-xl { font-size: 20pt !important; }
.text-2xl { font-size: 24pt !important; }
.text-3xl { font-size: 28pt !important; }
.text-4xl { font-size: 32pt !important; }

.text-muted { color: var(--muted-color) !important; }
.text-center { text-align: center !important; }
.text-uppercase { text-transform: uppercase; letter-spacing: 0.1em; }
.font-light { font-weight: 300; }
.font-bold { font-weight: 600; }

/* ===========================================
   BLOCKQUOTES
   =========================================== */

.reveal blockquote {
  border-left: 4px solid var(--primary-color);
  padding-left: 20px;
  margin: 20px 0;
  font-style: italic;
  background: none;
  box-shadow: none;
  width: 100%;
  max-width: none;
}

.reveal blockquote cite {
  display: block;
  margin-top: 10px;
  font-style: normal;
  color: var(--muted-color);
}

/* ===========================================
   ACCENT UNDERLINE ON TITLES
   =========================================== */

.reveal .slides section > h2 {
  flex-shrink: 0;
  margin: 0;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--line-color);
}

/* ===========================================
   FIGURE CARD - for notable figures slides
   =========================================== */

.figure-card {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 40px;
  align-items: start;
}

.figure-card img {
  border-radius: var(--box-radius);
  width: 100%;
  box-shadow: 0 4px 20px rgba(74, 158, 255, 0.15);
}

.figure-card .figure-info h3 {
  margin: 0 0 5px 0;
  color: var(--secondary-color);
  font-size: 14pt;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* ===========================================
   ERA BADGE - for timeline labels
   =========================================== */

.era-badge {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 12pt;
  font-weight: 500;
}

.era-badge.summer {
  background: rgba(245, 166, 35, 0.2);
  color: var(--secondary-color);
}

.era-badge.winter {
  background: rgba(74, 158, 255, 0.15);
  color: #6cb4ff;
}

.era-badge.spring {
  background: rgba(80, 200, 120, 0.2);
  color: #50c878;
}

/* ===========================================
   HIGHLIGHT BOX
   =========================================== */

.highlight-box {
  background: rgba(74, 158, 255, 0.08);
  border: 1px solid rgba(74, 158, 255, 0.25);
  border-radius: var(--box-radius);
  padding: 20px 25px;
}

/* Exercise hint: a single fragment that reveals the whole hint at once.
   The wrapping .fragment div is what animates; this just sizes the text
   (matching the old text-lg intent) and removes the global paragraph
   margin so the one-line hint is not double-spaced. */
.reveal .hint-box p {
  font-size: 18pt;
  margin: 0;
}

/* ===========================================
   COURSE STRUCTURE
   =========================================== */

.course-summary {
  max-width: 1120px;
  margin: 0 0 16px 0;
  color: #f0f4fb;
  font-size: 18pt !important;
  line-height: 1.4 !important;
}

.course-track-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  align-items: stretch;
}

.module-track-card {
  background: rgba(74, 158, 255, 0.07);
  border: 1px solid rgba(74, 158, 255, 0.22);
  border-radius: var(--box-radius);
  padding: 20px 22px;
}

.module-track-kicker {
  font-size: 12pt;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--secondary-color);
  margin-bottom: 8px;
}

.module-track-card h3 {
  margin: 0 0 8px 0;
}

.module-track-intro {
  font-size: 14pt !important;
  color: #d7ddea !important;
  margin: 0 0 10px 0;
  line-height: 1.4 !important;
}

.compact-list {
  margin: 0;
}

.reveal ul.compact-list li {
  font-size: 16pt;
  line-height: 1.35;
  margin-bottom: 7px;
  padding-left: 20px;
}

.course-note {
  margin-top: 14px;
  color: #d7ddea;
  font-size: 15pt !important;
  line-height: 1.35 !important;
}

.course-glossary {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px 18px;
  margin-top: 14px;
}

.glossary-item {
  background: rgba(245, 166, 35, 0.08);
  border: 1px solid rgba(245, 166, 35, 0.18);
  border-radius: var(--box-radius);
  padding: 12px 14px;
}

.glossary-item strong {
  color: var(--secondary-color);
}

.glossary-item p {
  font-size: 13pt !important;
  color: #d7ddea !important;
  margin: 6px 0 0 0;
  line-height: 1.4;
}

/* ===========================================
   TERMINAL OUTPUT
   =========================================== */

.terminal-output {
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 0;
  max-width: 800px;
  margin: 0 auto;
  text-align: left;
}

.terminal-output .terminal-bar {
  background: #161b22;
  border-radius: 8px 8px 0 0;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.terminal-output .terminal-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
}

.terminal-output .terminal-dot.red { background: #ff5f57; }
.terminal-output .terminal-dot.yellow { background: #febc2e; }
.terminal-output .terminal-dot.green { background: #28c840; }

.terminal-output .terminal-title {
  color: #8b949e;
  font-family: monospace;
  font-size: 10pt;
  margin-left: 8px;
}

.terminal-output .terminal-body {
  padding: 15px 20px;
}

.terminal-output .terminal-body pre {
  margin: 0;
  background: none !important;
  box-shadow: none !important;
}

.reveal .terminal-output .terminal-body pre.terminal-pre {
  font-size: 11pt;
  line-height: 1.5;
  color: #e8eaf0;
  background: none !important;
  padding: 0;
  box-shadow: none !important;
  font-family: monospace;
}

.reveal .terminal-output .terminal-body pre.terminal-pre span {
  font-size: inherit !important;
  line-height: inherit !important;
  font-family: inherit !important;
}

.reveal .terminal-output .terminal-body pre.terminal-pre p {
  display: inline;
  font-size: inherit !important;
  line-height: inherit !important;
  font-family: inherit !important;
  margin: 0 !important;
  color: inherit;
}

.reveal .terminal-output .terminal-body pre code {
  font-size: 11pt;
  line-height: 1.5;
  color: #e8eaf0;
  background: none !important;
  padding: 0;
  box-shadow: none !important;
  font-family: monospace;
}

.terminal-output .terminal-body .prompt {
  color: #8b949e;
}

.terminal-output .terminal-body .success {
  color: #3fb950;
}

.terminal-output .terminal-body .header {
  font-weight: bold;
}

.terminal-output .terminal-body .skipped {
  color: #8b949e;
  font-style: italic;
}

/* ===========================================
   TURNING POINT SLIDE
   =========================================== */

.turning-point h2 {
  border-bottom-color: var(--secondary-color) !important;
}

/* ===========================================
   CODE BLOCKS
   =========================================== */

.reveal pre {
  margin-bottom: 0;
  width: 100%;
  box-sizing: border-box;
  box-shadow: none !important;
  background: none !important;
}

.reveal pre code {
  font-size: 14pt;
  line-height: 1.4;
  padding: 10px 20px;
  border-radius: var(--box-radius);
  background: rgba(20, 25, 45, 0.8);
  color: var(--text-color);
  max-height: 400px;
}

.reveal pre code .hljs-keyword,
.reveal pre code .hljs-built_in {
  color: #c792ea;
}

.reveal pre code .hljs-string {
  color: #c3e88d;
}

.reveal pre code .hljs-comment {
  color: #546e7a;
}

.reveal pre code .hljs-number {
  color: #f78c6c;
}

.reveal code {
  color: var(--text-color);
}

/* ===========================================
   MATH (KaTeX)
   =========================================== */

.katex {
  color: var(--text-color);
  font-size: 1.1em;
}

.katex-display {
  margin: 15px 0;
}

.katex-display > .katex {
  font-size: 1.3em;
}

/* ===========================================
   VIDEO CONTAINERS
   =========================================== */

.video-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.video-container video,
.video-container img {
  max-width: 100%;
  max-height: 100%;
  border-radius: var(--box-radius);
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
}

/* ===========================================
   SIDE QUEST BADGE
   =========================================== */

.side-quest-badge {
  display: inline-block;
  background: rgba(245, 166, 35, 0.15);
  color: var(--secondary-color);
  padding: 3px 12px;
  border-radius: 12px;
  font-size: 12pt;
  font-weight: 500;
  margin-bottom: 10px;
}

/* ===========================================
   TERMINAL OUTPUT - ANSI COLOR PALETTE
   Replaces inline `style="color:#..."` on spans
   inside .terminal-pre. A rule on the span itself
   overrides the color inherited from .terminal-pre.
   =========================================== */

.terminal-output .terminal-body .t-red    { color: #e06c75; }
.terminal-output .terminal-body .t-orange { color: #d19a66; }
.terminal-output .terminal-body .t-yellow { color: #e5c07b; }
.terminal-output .terminal-body .t-green  { color: #98c379; }
.terminal-output .terminal-body .t-cyan   { color: #56b6c2; }
.terminal-output .terminal-body .t-blue   { color: #61afef; }
.terminal-output .terminal-body .t-gray   { color: #8b949e; }
.terminal-output .terminal-body .t-fg     { color: #e8eaf0; }
.terminal-output .terminal-body .t-fail   { color: #e74c3c; }

.terminal-caption {
  margin-top: 15px;
  text-align: center;
}

/* ===========================================
   TIMELINE (module 1) - per-node structure
   Positional left/width and per-era colors stay
   inline; this captures the repeated boilerplate.
   =========================================== */

.tl-node  { position: absolute; transform: translateX(-50%); text-align: center; }
/* .reveal prefix needed: `.reveal p` (0,1,1) sets color/font-size and would
   otherwise beat a bare .tl-* class. The original used inline styles. */
.reveal .tl-label { font-size: 10pt; color: var(--muted-color); white-space: nowrap; margin: 0; }
.reveal .tl-year  { font-size: 11pt; font-weight: 600; margin: 2px 0 0 0; }
.tl-stem  { width: 1px; opacity: 0.5; margin: 2px auto 0; }
.tl-dot   { width: 10px; height: 10px; border-radius: 50%; margin: 0 auto; }

.tl-node.below .tl-stem  { margin: 0 auto; }
.tl-node.below .tl-year  { margin: 0; }
.tl-node.below .tl-label { margin: 2px 0 0 0; }

/* ===========================================
   CANONICAL SLIDE TYPES
   Backs the :::divider / :::columns / :::note /
   :::quiz / :::step / :::interactive fences so
   slides.md carries no inline layout styles.
   (.section-divider, .figure-card, .terminal-output,
    .hint-box are defined above and reused.)
   =========================================== */

/* :::columns - grid; template/gap/valign supplied by the build */
.reveal .slide-columns {
  display: grid;
  align-items: start;
  margin: 10px 0;
}

/* :::note - callout box (canonical replacement for .highlight-box) */
.reveal .note {
  background: rgba(74, 158, 255, 0.08);
  border: 1px solid rgba(74, 158, 255, 0.25);
  border-radius: var(--box-radius);
  padding: 20px 25px;
  margin: 20px 0;
}

.reveal .note p {
  font-size: 18pt;
  margin: 0;
}

.reveal .note p + p {
  margin-top: 0.6em;
}

/* :::note variant="hint" - lighter, boxless (also used inside :::step) */
.reveal .note.hint-box {
  background: none;
  border: none;
  padding: 0;
}

/* :::quiz - prompt scales up; its last line is the question */
.reveal .quiz-prompt p {
  font-size: 18pt;
  margin: 0 0 0.6em 0;
}

.reveal .quiz-prompt p:last-child {
  font-size: 24pt;
  color: var(--text-color);
  margin: 0.5em 0 0 0;
}

.reveal .quiz-answer {
  margin-top: 30px;
}

/* :::step - spacing between code, hint, and answer */
.reveal .hint-box {
  margin-top: 22px;
}

.reveal .hint-box + .note {
  margin-top: 8px;
  padding: 12px 18px;
}

/* :::interactive - widget fills the slide body like a video */
.reveal .interactive-host {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 0;
  width: 100%;
}

/* ===========================================
   FOLDING WIDGET  (:::interactive widget="folding")
   Linked input-space / hidden-space views with
   per-neuron weight & bias sliders.
   =========================================== */

.fold-widget {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 100%;
  height: 100%;
}

.fold-views {
  display: grid;
  grid-template-columns: 1fr 1fr 0.85fr;
  gap: 18px;
  flex: 1;
  min-height: 0;
}

.fold-view {
  display: flex;
  flex-direction: column;
  margin: 0;
  min-height: 0;
}

.reveal .fold-view figcaption {
  font-size: 14pt;
  color: var(--primary-color);
  font-weight: 600;
  text-align: center;
  margin-bottom: 6px;
}

.fold-canvas {
  flex: 1;
  min-height: 0;
  width: 100%;
  background: #0d1225;
  border: 1px solid var(--line-color);
  border-radius: var(--box-radius);
}

.fold-controls {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.fold-modes {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.fold-modes button {
  font-family: var(--body-font);
  font-size: 13pt;
  color: var(--text-color);
  background: rgba(74, 158, 255, 0.10);
  border: 1px solid rgba(74, 158, 255, 0.35);
  border-radius: 6px;
  padding: 6px 14px;
  cursor: pointer;
}

.fold-modes button.active {
  background: var(--primary-color);
  border-color: var(--primary-color);
  color: #0a0e1a;
  font-weight: 600;
}

.fold-modes button.fold-reset {
  background: rgba(245, 166, 35, 0.12);
  border-color: rgba(245, 166, 35, 0.40);
  color: var(--secondary-color);
}

.fold-sliders {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px 24px;
}

.fold-slider {
  display: grid;
  grid-template-columns: 70px 1fr 52px;
  align-items: center;
  gap: 10px;
}

.reveal .fold-slider label {
  font-size: 12pt;
  margin: 0;
  font-family: var(--body-font);
  font-weight: 600;
}

.fold-slider input[type="range"] {
  width: 100%;
  accent-color: var(--primary-color);
}

.reveal .fold-slider .fold-val {
  font-size: 12pt;
  color: var(--text-color);
  font-family: monospace;
  text-align: right;
  margin: 0;
}

.reveal .fold-readout {
  font-size: 13pt;
  color: var(--muted-color);
  text-align: center;
  margin: 0;
}

.reveal .fold-readout strong {
  color: var(--secondary-color);
}

/* ===========================================
   MLP BOUNDARY WIDGET  (:::interactive widget="mlpBoundary")
   =========================================== */

.mlp-widget {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 100%;
  height: 100%;
}

.mlp-canvas-wrap {
  flex: 1;
  min-height: 0;
}

.mlp-canvas,
.land-canvas {
  width: 100%;
  height: 100%;
  min-height: 0;
  min-width: 0;
  background: #0d1225;
  border: 1px solid var(--line-color);
  border-radius: var(--box-radius);
}

.mlp-controls,
.land-controls {
  display: grid;
  grid-template-columns: repeat(2, minmax(240px, 1fr));
  gap: 10px 24px;
  align-items: center;
}

.mlp-slider {
  display: grid;
  grid-template-columns: 70px 1fr 58px;
  align-items: center;
  gap: 10px;
}

.reveal .mlp-slider label,
.reveal .mlp-slider p {
  font-size: 12pt;
  margin: 0;
}

.reveal .mlp-slider label {
  color: var(--primary-color);
  font-weight: 600;
}

.mlp-slider input[type="range"] {
  width: 100%;
  accent-color: var(--primary-color);
}

.reveal .mlp-slider p {
  color: var(--text-color);

## Review: Module 3

<div class="slide-columns" style="grid-template-columns: repeat(2, 1fr); gap: 30px;">

<div>

**Self-Attention as a Learned Lookup**

Compare every token (query) against every other token (key), normalize with softmax, and retrieve a weighted sum of values:

$$\text{Attention}(Q, K, V) = \text{softmax}\!\left(\frac{QK^T}{\sqrt{d_k}}\right) V$$

Each output token is a weighted average of value vectors, with weights from query-key compatibility.

</div>

<div>

**The Missing Pieces**

- A single attention layer is not a model; it needs embeddings, depth (stacked blocks), and an output head
- Positional embeddings inject order into a bag of attention scores
- Causal masking ensures autoregressive generation: each token only attends to itself and previous tokens

</div>

## Review: From Attention to Models

<div class="slide-columns" style="grid-template-columns: repeat(2, 1fr); gap: 30px;">

<div>

**What Module 3 gave us**

- Queries choose what each token is looking for
- Keys describe what each token offers
- Values carry the information to copy forward
- A causal mask blocks attention to future tokens

</div>

<div>

**What is still missing**

- Token IDs must become vectors
- Attention must be wrapped in residuals, normalization, and feed-forward networks
- Many blocks must stack before logits become text
- Architecture choices determine what the model can do

</div>

</div>

<!-- .slide: id="rnn-idea" -->

## Recurrent Neural Networks

<div class="rnn-flow">
  <div class="rnn-token">the</div>

  <div class="rnn-cell">RNN<br><span>state 1</span></div>

  <div class="rnn-cell">same cell<br><span>state 3</span></div>
</div>

<div class="formula-card">new hidden state = function(previous hidden state, current token)</div>

The same cell is reused at every time step. The hidden state is a fixed-size summary, so long sequences force more and more history into one vector.

---

<!-- .slide: id="rnn-problems" -->

## The Problems with Recurrence

Recurrent training is fundamentally hard for three reasons:

- **Vanishing and exploding gradients.** Gradients must survive repeated matrix multiplications as they travel backward through time. Over long sequences the product of many weight matrices either shrinks to near zero (vanishing) or blows up (exploding). This is the same backprop multiplication rule from Module 2, amplified across many recurrent steps.

- **Sequential dependency.** Token $t$ cannot be processed until tokens $1$ through $t-1$ are done. This makes training impossible to parallelize across the sequence: for a batch of $n$ tokens, the RNN takes $n$ serial steps instead of one parallel step.

- **Fixed-size bottleneck.** The hidden state has a fixed dimension. No matter how long the input, all context must be squeezed through one vector of the same size.

---

<!-- .slide: id="lstm-gru" -->

## LSTMs and GRUs: Gating Mechanisms

<div class="gate-diagram">
  <div class="gate-input">previous state<br>+ current token</div>
  <div class="gate-arrow">&rarr;</div>
  <div class="gate-stack">
    <div class="gate forget">forget gate<br><span>what to erase</span></div>
    <div class="gate input">input gate<br><span>what to write</span></div>
    <div class="gate output">output gate<br><span>what to expose</span></div>
  </div>
  <div class="gate-arrow">&rarr;</div>
  <div class="gate-memory">cell state<br><span>longer memory path</span></div>
</div>

LSTMs added gates so information could be selectively remembered, overwritten, or hidden. GRUs simplified the same idea into update and reset gates.

Both kept the **sequential and bottleneck limitations.** The cell was improved, but the architecture was still fundamentally serial.

<!-- .slide: id="seq2seq" -->

## Sequence-to-Sequence Learning

Encoder-decoder RNNs (Sutskever et al., 2014) split the problem into two recurrent networks:

- **Encoder:** reads the input sequence and compresses it into a single fixed-size context vector
- **Decoder:** generates the output sequence, conditioned on that vector

This was the dominant architecture for machine translation. But the fixed-vector bottleneck is severe: a long source sentence must be compressed into the same-size vector as a short one.

Bahdanau attention (Module 3) was invented specifically to fix this bottleneck, letting the decoder attend directly to encoder states instead of relying on a single compressed vector.

<!-- .slide: id="attention-is-all-you-need" -->

## Attention Is All You Need (2017)

Vaswani et al. removed recurrence entirely. In its place: stacked multi-head self-attention with position-wise feed-forward networks.

Why this mattered:

- **Full parallelism across positions.** Every token can be processed at the same time during training; only the causal mask enforces order at inference time.

- **Constant path length.** In an RNN, information from token 1 must travel through every intermediate hidden state to reach token $n$. In a transformer, token 1 and token $n$ interact directly through one attention layer. The longest signal path is $O(1)$ layers, not $O(n)$ recurrent steps.

- **No fixed-size bottleneck.** Each layer accesses the full sequence through attention; nothing is compressed into a single vector.

The transformer is best understood as a direct response to RNN limitations. Every design choice trades sequential recurrence for parallel computation.

# Tokenization

What is the atomic unit of a language model?


---

<!-- .slide: id="unit-problem" -->

## The Unit Problem

What should a language model read? Three natural choices, each with a fatal flaw:

<div class="slide-columns" style="grid-template-columns: repeat(3, 1fr); gap: 25px;">

<div>

**Characters**

Tiny vocabulary (maybe 256 bytes), but sequences become very long. The model wastes capacity relearning spelling and morphology. Each token carries almost no meaning.

</div>

<div>

**Words**

Meaningful units, but the vocabulary explodes to hundreds of thousands. Any unseen word is out-of-vocabulary with no way to represent it. Misspellings, typos, and brand-new words break the model.

</div>

<div>

**Subwords**

The compromise: frequent words stay whole, rare words split into reusable pieces. "tokenization" becomes "token" + "ization". Morphology, typos, and new coinages are all representable.

</div>

</div>

# Three Architectural Families

Encoder-decoder, encoder-only, and decoder-only


---

<!-- .slide: id="encoder-decoder" -->

## Family 1: Encoder-Decoder

<div class="encoder-decoder-layout">
  <img src="images/transformer.webp" alt="Original transformer encoder-decoder architecture">
  <div>
    <p>The original transformer has two stacks: an encoder for the input and a decoder for the output.</p>
    <div class="family-grid">
      <div><strong>Encoder</strong><span>bidirectional self-attention over the source</span></div>
      <div><strong>Decoder</strong><span>causal self-attention plus cross-attention to encoder states</span></div>
      <div><strong>Best fit</strong><span>translation, summarization, and other input-output sequence tasks</span></div>
      <div><strong>Examples</strong><span>T5 and BART keep separate input understanding and output generation</span></div>
    </div>
  </div>
</div>

---

<!-- .slide: id="encoder-only" -->

## Family 2: Encoder-Only

Bidirectional attention, no causal mask, no decoder. Trained with **masked language modeling** (forward reference to Module 5): some input tokens are hidden, and the model must predict them from their context on both sides.

$$\text{output}_i = f(\mathbf{x}_1, \dots, \mathbf{x}_n) \quad \text{for all } i$$

Use cases: classification, sentence embeddings, retrieval, named-entity recognition. The model produces representations, not generations.

BERT (Devlin et al., 2018) made this architecture dominant for "understanding" tasks. RoBERTa improved the training recipe without changing the architecture.

---

<!-- .slide: id="decoder-only" -->

## Family 3: Decoder-Only

Causal masking, autoregressive next-token prediction. Each token attends only to itself and previous tokens.

$$\text{output}_t = f(\mathbf{x}_1, \dots, \mathbf{x}_t)$$

Built for generation, but capable of nearly everything through prompting. GPT (Radford et al., 2018), GPT-2 (2019), GPT-3 (2020), and the Llama lineage all share this design.

Why decoder-only won for LLMs:

- A single stack is simpler and scales cleanly
- The next-token objective gives a dense training signal at every position
- The generative objective subsumes "understanding" tasks: you can phrase classification as a completion prompt
- No task-specific heads are needed; everything becomes text generation
- In-context and few-shot learning emerge at scale

---

<!-- .slide: id="honest-tradeoffs" -->

## The Honest Trade-offs

Decoder-only did **not** win on every axis. It won on generality and scaling:

- **Encoder-only** is still more efficient for fixed-vector embeddings, retrieval, and classification. If you only need a sentence representation, BERT-style models are faster.

- **Encoder-decoder** remains strong where input and output are clearly distinct, as in machine translation. The input can be processed bidirectionally while the output is generated autoregressively.

- **Decoder-only** excels when the task is open-ended or when you want a single model to handle many tasks through prompting. The price is that every task must be phrased as text completion.

The choice depends on the problem, not on decoder-only being universally superior.

<!-- .slide: id="divider-beyond" class="section-divider" data-state="is-section-divider" -->

# Beyond the Vanilla Transformer

Modern blocks, MoE, and sub-quadratic alternatives


---

<!-- .slide: id="modern-block" -->

## The Modern Block: 2017 vs Llama-Style

The vanilla transformer block has been refined in nearly every component:

<div class="slide-columns" style="grid-template-columns: repeat(2, 1fr); gap: 30px;">

<div>

**Original Transformer (2017)**

- LayerNorm
- ReLU activation in FFN
- Sinusoidal positional embeddings
- Post-norm (normalize after sub-layer)
- Bias terms in all linear layers

</div>

<div>

**Modern Llama-Style**

- RMSNorm (simpler, faster)
- SwiGLU activation (smoother, better gradients)
- RoPE (rotary positional embeddings, callback to Module 3)
- Pre-norm (normalize before sub-layer)
- **Dropped bias terms** in linear layers (saves parameters)

</div>

</div>

These changes are mostly independent but together produce a more stable and more efficient training run.

---

<!-- .slide: id="moe" -->

## Mixture of Experts

<div class="moe-diagram">
  <div class="router-box">router<br><span>top-k experts per token</span></div>
  <div class="expert-grid">
    <div class="expert active">expert 3<br><span>GPU active</span></div>
    <div class="expert">expert 8<br><span>CPU or cold GPU</span></div>
    <div class="expert active">expert 17<br><span>GPU active</span></div>
    <div class="expert">expert 42<br><span>CPU or cold GPU</span></div>
  </div>
</div>

$$\text{MoE}(\mathbf{x}) = \sum_{i=1}^{E} g(\mathbf{x})_i \cdot \text{FFN}_i(\mathbf{x})$$

where $g(\mathbf{x})$ is the router output (a sparse gate) and only the top-$k$ experts receive nonzero weight.

Sparse activation buys far more parameters at roughly the same compute per token. It also creates a memory-serving trade-off: inactive experts can be staged across CPU memory, GPU memory, or multiple devices, while the active experts for the current batch need fast access.

---

<!-- .slide: id="sub-quadratic" -->

## Sub-Quadratic Alternatives

Attention is $O(n^2)$ in sequence length. For very long contexts, this is the bottleneck. Active research explores alternatives:

- **State-space models** (Mamba): a recurrent update with input-dependent gates. Linear in sequence length, but the state is a fixed-size compression.
- **Linear attention:** kernelize the softmax to avoid the $n \times n$ matrix entirely. Exact in some variants, approximate in others.
- **RWKV:** combines a recurrent update with linear attention-like weights, aiming to get the best of both worlds.

Hybrids like **Jamba** mix attention layers with Mamba layers: attention for short-range precision, state-space for long-range compression.

These are clearly labeled active research. The transformer remains the dominant architecture, but the $O(n^2)$ cost ensures that alternatives will continue to be explored.

---

<!-- .slide: id="divider-sampling" class="section-divider" data-state="is-section-divider" -->

# Generating Text

From logits to tokens: decoding strategies


---

<!-- .slide: id="logits-to-text" -->

## From Logits to Text

A forward pass gives a probability distribution over the vocabulary for the next token. Decoding chooses one token, appends it to the context, and repeats.

$$p_i = \frac{e^{z_i}}{\sum_j e^{z_j}}$$

where $z_i$ is the logit for vocabulary item $i$. The choice of how to sample from this distribution is the **decoding strategy**, and it shapes what you actually read.

---

<!-- .slide: id="greedy-decoding" -->

## Greedy Decoding

Always pick the token with the highest probability:

$$\text{token}_t = \arg\max_i \, p_i$$

Simple, deterministic, and fast. But it produces repetitive, flat text because it never explores lower-probability but more interesting continuations. Once the model enters a loop ("the the the"), greediness keeps it there.

---

<!-- .slide: id="temperature" -->

## Temperature

Scale the logits before softmax to control randomness:

$$p_i = \frac{e^{z_i / T}}{\sum_j e^{z_j / T}}$$

- $T < 1$: sharpens the distribution. The model becomes more conservative, sticking to high-probability tokens.
- $T = 1$: the original distribution.
- $T > 1$: flattens the distribution. Unlikely tokens gain probability; the output becomes more random and creative.

Temperature is the simplest way to tune the exploration-exploitation trade-off at inference time.

---

<!-- .slide: id="topk-topp" -->

## Top-k and Top-p (Nucleus) Sampling

Temperature alone can still sample implausible tokens. Two truncation methods fix this:

<div class="slide-columns" style="grid-template-columns: repeat(2, 1fr); gap: 30px;">

<div>

**Top-k**

Keep only the $k$ most likely tokens, zero out the rest, renormalize, and sample. Fixed $k = 50$ is common. Simple, but can be too restrictive for peaked distributions or too permissive for flat ones.

</div>

<div>

**Top-p (nucleus)**

Keep the smallest set of tokens whose cumulative probability exceeds $p$. For a peaked distribution, this may be only 5 tokens. For a flat distribution, it may be 200. Adapts dynamically to the distribution shape.

</div>

</div>

In practice, temperature and top-p/top-k are used together: scale by temperature first, then truncate, then sample.

---

<!-- .slide: id="beam-search" -->

## Beam Search

<div class="beam-diagram">
  <div class="beam-node root">The</div>
  <div class="beam-level">
    <div class="beam-node kept">cat<br><span>0.42</span></div>
    <div class="beam-node kept">dog<br><span>0.31</span></div>
    <div class="beam-node dropped">car<br><span>0.08</span></div>
  </div>
  <div class="beam-level">
    <div class="beam-node kept">cat sat<br><span>0.18</span></div>
    <div class="beam-node kept">dog ran<br><span>0.15</span></div>
    <div class="beam-node dropped">cat barked<br><span>0.03</span></div>
  </div>
</div>

Instead of committing to one token, keep the $b$ best partial sequences at every step. Expand every beam, score the candidates, and keep the top $b$.

Best for constrained sequence-to-sequence tasks like translation, where there is a single correct answer and exploration helps. Poor for open-ended generation: the most likely sequence under a language model is usually vacuous, repetitive, or otherwise undesirable.

This sets up the exercise: a trained model is only half the story. The decoding strategy shapes what you actually read.

# Quiz


---

<!-- .slide: id="quiz-ffn" -->

## Why Does the Feed-Forward Network Matter?

<div class="quiz-prompt">

The attention sub-layer mixes information between positions, but the feed-forward network (FFN) processes each position independently. Why is the FFN still crucial?

</div>

<div class="fragment note quiz-answer">

The FFN is where most of the model's parameters and stored "knowledge" live. Each neuron acts like a key-value pair: when its input activates it, the neuron retrieves a learned output vector. Without the FFN, the model would only mix existing embeddings and would have no way to store or recall facts.

</div>

---

<!-- .slide: id="quiz-pre-post-norm" -->

## Pre-Norm vs Post-Norm

<div class="quiz-prompt">

The original transformer placed LayerNorm after each sub-layer (post-norm). Modern models place it before (pre-norm). Why is pre-norm preferred?

</div>

<div class="fragment note quiz-answer">

Pre-norm is more stable to train at depth. With post-norm, gradients must propagate through the normalization layer before reaching the residual add, and in deep stacks this compounds into vanishing or exploding gradients. Pre-norm puts the normalization outside the residual path, keeping the gradient highway clean.

</div>

---

<!-- .slide: id="quiz-decoder-only" -->

## Why Did Decoder-Only Win for LLMs?

<div class="quiz-prompt">

Decoder-only models are not universally better. What specific advantages made them the dominant LLM architecture?

</div>

<div class="fragment note quiz-answer">

A single stack is simpler and scales cleanly. The next-token objective gives a dense training signal at every position. The generative objective subsumes "understanding" tasks: classification can be phrased as text completion. And emergent in-context learning appears at scale without task-specific heads.

</div>

---

<!-- .slide: id="quiz-token-tax" -->

## The Tokenization Trade-Off

<div class="quiz-prompt">

A larger vocabulary means shorter sequences but a larger embedding matrix. Why does non-English text often cost more tokens per sentence?

</div>

<div class="fragment note quiz-answer">

English is overrepresented in training corpora, so English subword sequences are shorter (more words fit whole in the vocabulary). Languages with different scripts or less training data are split into more pieces. This is the "token tax": the same semantic content requires more tokens, inflating both cost and context-window usage.

</div>

---

<!-- .slide: id="quiz-moe" -->

## How Does MoE Add Parameters Without Adding Compute?

<div class="quiz-prompt">

Mixture of Experts replaces one large FFN with many smaller FFNs plus a router. Why does total compute per token stay roughly constant?

</div>

<div class="fragment note quiz-answer">

The router selects only a small subset of experts (e.g., top-2 out of 64) for each token. Most expert parameters are inactive on any given forward pass. Parameter count scales with the number of experts, but compute scales only with the activated subset.

</div>

---

<!-- .slide: id="quiz-temperature" -->

## The Effect of Temperature on Sampling

<div class="quiz-prompt">

Temperature $T$ scales logits before softmax. How does a very high temperature change the sample distribution, and why might that be undesirable?

</div>

<div class="fragment note quiz-answer">

High temperature flattens the distribution, making unlikely tokens nearly as probable as likely ones. The output becomes random, ungrammatical, and thematically inconsistent. Conversely, very low temperature sharpens the peak, producing repetitive, deterministic text. The sweet spot is typically $T \approx 0.7 \text{ to } 1.0$.

</div>

//     onSlideChanged: function(event){...}                 // optional
//   };
// =====================================================================
var MODULE_CONFIG = window.MODULE_CONFIG || {};

// ---- Manim section step-through player ----
// Section video lists are inline to avoid fetch() issues with file:// protocol.
var MANIM_SECTIONS = MODULE_CONFIG.manimSections || {};

var manimSteppers = {};

function initManimStepper(video) {
  var scene = video.getAttribute('data-manim-scene');
  var sections = MANIM_SECTIONS[scene] || [];
  var state = { sections: sections, current: -1, playing: false, video: video, scene: scene };
  manimSteppers[scene] = state;

  // Set poster frame from first section
  if (sections.length > 0) {
    video.src = 'media/sections/' + sections[0];
    video.load();
  }

  video.addEventListener('ended', function() {
    state.playing = false;
  });
}

function advanceManimStepper(scene) {
  var state = manimSteppers[scene];
  if (!state || state.playing) return false;
  if (state.current >= state.sections.length - 1) return false;

  state.current++;
  state.playing = true;
  var file = state.sections[state.current];
  state.video.src = 'media/sections/' + file;
  state.video.load();
  state.video.play().then(function() {}).catch(function() { state.playing = false; });
  return true;
}

function resetManimStepper(scene) {
  var state = manimSteppers[scene];
  if (!state) return;
  state.current = -1;
  state.playing = false;
  state.video.pause();
  if (state.sections.length > 0) {
    state.video.src = 'media/sections/' + state.sections[0];
    state.video.load();
  }
}

// Instantly finish the section that is currently playing by jumping to its
// final frame. This lets an impatient "next" complete the animation in
// place rather than leaking through to reveal and skipping the slide.
// Returns true if it consumed the action (a video was actually playing).
function skipManimStepper(scene) {
  var state = manimSteppers[scene];
  if (!state || !state.playing) return false;
  var v = state.video;
  v.pause();
  // Seek just shy of the end so the step's end state stays on screen.
  if (v.duration && isFinite(v.duration)) {
    try { v.currentTime = Math.max(0, v.duration - 0.04); } catch (e) {}
  }
  state.playing = false;
  return true;
}

// One forward action on a manim slide. If a section is mid-play, the press
// completes it (skip to the end frame); otherwise it advances to the next
// section. Returns false only when there is nothing left to animate, which
// is the signal that reveal.js may now move on to the next slide.
function manimForward(scene) {
  var state = manimSteppers[scene];
  if (!state) return false;
  if (state.playing) return skipManimStepper(scene);
  return advanceManimStepper(scene);
}

// ---- Initialize Reveal.js ----
Reveal.initialize({
  width: 1280,
  height: 720,
  margin: 0,
  controls: true,
  progress: true,
  slideNumber: false,
  hash: true,
  transition: 'slide',
  center: false,
  autoAnimateDuration: 0.8,
  plugins: [ RevealHighlight, RevealMarkdown ]
});

// ---- Syntax highlighting ----
// reveal-markdown converts the inline <textarea> into <pre><code> blocks
// in a deferred microtask, AFTER the highlight plugin's init() has already
// run, so code ships un-highlighted. Re-trigger the plugin once the blocks
// exist (on ready) and for any added later (on slidechanged).
function highlightAllCodeBlocks() {
  if (!Reveal.getPlugin) return;
  var hl = Reveal.getPlugin('highlight');
  if (!hl || typeof hl.highlightBlock !== 'function') return;
  document.querySelectorAll('pre code').forEach(function(block) {
    if (block.dataset.highlighted === 'yes') return;
    hl.highlightBlock(block);
  });
}
// reveal-markdown may materialize blocks in waves, so re-run the
// (idempotent) pass across the startup window rather than once.
Reveal.on('ready', function() {
  var tries = 0;
  var iv = setInterval(function() {
    tries++;
    highlightAllCodeBlocks();
    if (tries > 25) clearInterval(iv);
  }, 100);
});
Reveal.on('slidechanged', highlightAllCodeBlocks);
Reveal.on('fragmentshown', highlightAllCodeBlocks);

function initStepperClickHandlers() {
  document.querySelectorAll('.manim-stepper').forEach(function(video) {
    if (video.dataset.clickInit) return;
    video.dataset.clickInit = '1';
    video.style.cursor = 'pointer';
    video.addEventListener('click', function(e) {
      var scene = video.getAttribute('data-manim-scene');
      manimForward(scene);
      e.stopPropagation();
      e.preventDefault();
    });
  });
}

function initAllSteppers() {
  document.querySelectorAll('.manim-stepper').forEach(function(v) {
    if (!manimSteppers[v.getAttribute('data-manim-scene')]) {
      initManimStepper(v);
    }
  });
  initStepperClickHandlers();
}

function renderMath() {
  if (typeof renderMathInElement !== 'undefined') {
    renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\(', right: '\\)', display: false}
      ]
    });
  }
}

// reveal-markdown loads slides asynchronously, so the 'ready' event may
// fire before the markdown content is in the DOM. Poll briefly.
Reveal.on('ready', function() {
  var tries = 0;
  var iv = setInterval(function() {
    tries++;
    if (document.querySelectorAll('section').length > 5 || tries > 20) {
      clearInterval(iv);
      initAllSteppers();
      renderMath();
    }
  }, 100);
});

// Reset steppers when leaving a slide
Reveal.on('slidechanged', function(event) {
  initAllSteppers();
  Object.keys(manimSteppers).forEach(function(scene) {
    if (!event.currentSlide.querySelector('[data-manim-scene="' + scene + '"]')) {
      resetManimStepper(scene);
    }
  });
});

// Intercept right arrow / space / enter on manim slides to step through
// sections. manimForward consumes the press while there is still animation
// to play (completing the current section or starting the next), so reveal
// only advances the slide once every section has been shown.
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') {
    var currentSlide = Reveal.getCurrentSlide();
    var stepper = currentSlide ? currentSlide.querySelector('.manim-stepper') : null;
    if (stepper) {
      var scene = stepper.getAttribute('data-manim-scene');
      if (manimForward(scene)) {
        e.stopImmediatePropagation();
        e.preventDefault();
      }
    }
  }
}, true);

// The on-screen controls (controls: true) navigate directly and bypass the
// keydown handler above, so guard the forward arrows the same way: a forward
// control press on a manim slide steps the animation before leaving.
document.addEventListener('click', function(e) {
  var btn = e.target.closest ? e.target.closest('.navigate-right, .navigate-down') : null;
  if (!btn) return;
  var currentSlide = Reveal.getCurrentSlide();
  var stepper = currentSlide ? currentSlide.querySelector('.manim-stepper') : null;
  if (stepper && manimForward(stepper.getAttribute('data-manim-scene'))) {
    e.stopImmediatePropagation();
    e.preventDefault();
  }
}, true);

// =====================================================================
// Interactive widgets (:::interactive). Each widget is a factory keyed
// by its `data-widget` value; it owns its host element and (re)draws
// whenever its slide becomes visible or the window resizes.
// =====================================================================
var INTERACTIVE_WIDGETS = {};

function hydrateInteractiveWidgets() {
  document.querySelectorAll('.interactive-host[data-widget]').forEach(function(host) {
    if (host.dataset.hydrated) return;
    var factory = INTERACTIVE_WIDGETS[host.getAttribute('data-widget')];
    if (!factory) return;
    host.dataset.hydrated = '1';
    host._widget = factory(host) || null;
  });
}

function refreshInteractiveWidgets() {
  document.querySelectorAll('.interactive-host[data-widget]').forEach(function(host) {
    if (host._widget && typeof host._widget.resize === 'function') host._widget.resize();
  });
}

Reveal.on('ready', function() {
  var tries = 0;
  var iv = setInterval(function() {
    tries++;
    if (document.querySelector('.interactive-host[data-widget]') || tries > 25) {
      clearInterval(iv);
      hydrateInteractiveWidgets();
      requestAnimationFrame(refreshInteractiveWidgets);
    }
  }, 100);
});
Reveal.on('slidechanged', function() {
  hydrateInteractiveWidgets();
  requestAnimationFrame(refreshInteractiveWidgets);
});
window.addEventListener('resize', refreshInteractiveWidgets);

// ---- Per-module hooks (from MODULE_CONFIG) ----
if (MODULE_CONFIG.title) document.title = MODULE_CONFIG.title;
if (MODULE_CONFIG.widgets) Object.assign(INTERACTIVE_WIDGETS, MODULE_CONFIG.widgets);
if (typeof MODULE_CONFIG.onReady === 'function') {
  Reveal.on('ready', function() { MODULE_CONFIG.onReady(Reveal); });
}
if (typeof MODULE_CONFIG.onSlideChanged === 'function') {
  Reveal.on('slidechanged', function(event) { MODULE_CONFIG.onSlideChanged(event); });
}

// =====================================================================
// MLP Core — Shared neural-net library consumed by multiple widgets.
// Deterministic data generation, preset lookup-model geometry, and the
// Adam trainer (used by the debug harness; the deck uses lookupModel).
// =====================================================================

// =====================================================================
// Shared MLP core for the boundaryExplorer and mlpBoundary widgets.
// The slide widgets use deterministic lookup presets keyed by
// dataset/width/depth so a button click always loads the intended working
// or under-capacity example. The older Adam trainer is kept as a fallback
// helper for the debug harness, but the deck paths pass a dataset name and
// therefore use lookupModel() rather than browser-time training.
// =====================================================================
var MLP = (function () {
  var EPOCHS = 220, LR = 0.05, BATCH = 16;
  var MAX_RESTARTS = 24, TIME_BUDGET_MS = 450, EARLY_STOP = 0.999;
  var CENTER = 0.5; // input centering offset

  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  // Deterministic datasets (fixed seed) normalized into [0.04, 0.96].
  function generateData(name) {
    var rnd = mulberry32(7);
    var pts = [];
    if (name === 'linear') {
      for (var i = 0; i < 60; i++) {
        var x = rnd() * 2 - 1, y = rnd() * 2 - 1;
        pts.push({ x: x + 1.5, y: y + 1.5, cls: 1 });
        pts.push({ x: x - 1.5, y: y - 1.5, cls: 0 });
      }
    } else if (name === 'xor') {
      var clusters = [[1.5, 1.5, 1], [1.5, -1.5, 0], [-1.5, 1.5, 0], [-1.5, -1.5, 1]];
      clusters.forEach(function (c) {
        for (var i = 0; i < 20; i++) {
          pts.push({ x: c[0] + (rnd() - 0.5) * 0.6, y: c[1] + (rnd() - 0.5) * 0.6, cls: c[2] });
        }
      });
    } else if (name === 'moons') {
      for (var i = 0; i < 50; i++) {
        var t = Math.PI * i / 50;
        pts.push({ x: Math.cos(t) + (rnd() - 0.5) * 0.12, y: Math.sin(t) + (rnd() - 0.5) * 0.12, cls: 1, idx: i });
        pts.push({ x: 1.1 - Math.cos(t) + (rnd() - 0.5) * 0.12, y: 0.4 - Math.sin(t) + (rnd() - 0.5) * 0.12, cls: 0, idx: i });
      }
    } else if (name === 'spiral') {
      // Gentle ~1.15-turn two-arm spiral: clearly a spiral, yet learnable by
      // a depth-2 ReLU net in-budget (the old 1.7-turn tight spiral was not).
      var turns = 1.15, n = 60, tmax = turns * 2 * Math.PI;
      for (var i = 0; i < n; i++) {
        var t = tmax * i / n;
        var r = 0.15 + 0.30 * t / (2 * Math.PI);
        pts.push({ x: r * Math.cos(t) + (rnd() - 0.5) * 0.04, y: r * Math.sin(t) + (rnd() - 0.5) * 0.04, cls: 1, idx: i });
        pts.push({ x: -r * Math.cos(t) + (rnd() - 0.5) * 0.04, y: -r * Math.sin(t) + (rnd() - 0.5) * 0.04, cls: 0, idx: i });
      }
    }
    var xs = pts.map(function (p) { return p.x; }), ys = pts.map(function (p) { return p.y; });
    var xmn = Math.min.apply(null, xs), xmx = Math.max.apply(null, xs);
    var ymn = Math.min.apply(null, ys), ymx = Math.max.apply(null, ys);
    var xr = xmx - xmn || 1, yr = ymx - ymn || 1;
    pts.forEach(function (p) {
      p.x = 0.04 + 0.92 * (p.x - xmn) / xr;
      p.y = 0.04 + 0.92 * (p.y - ymn) / yr;
    });
    return pts;
  }

  function zeros(n) { var a = []; for (var i = 0; i < n; i++) a.push(0); return a; }
  function randn(rng) {
    var u = Math.max(1e-12, rng());
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * rng());
  }
  // He initialization (std = sqrt(2/in)) -- the right scale for ReLU layers.
  function heLayer(outDim, inDim, rng) {
    var std = Math.sqrt(2 / inDim), W = [], b = zeros(outDim);
    for (var i = 0; i < outDim; i++) {
      var row = [];
      for (var j = 0; j < inDim; j++) row.push(randn(rng) * std);
      W.push(row);
    }
    return { W: W, b: b };
  }
  function matVec(W, x) { return W.map(function (row) { return row.reduce(function (s, wj, j) { return s + wj * x[j]; }, 0); }); }
  function vecAdd(a, b) { return a.map(function (v, i) { return v + b[i]; }); }

  function createNet(width, depth, rng) {
    var layers = [heLayer(width, 2, rng)];
    for (var d = 1; d < depth; d++) layers.push(heLayer(width, width, rng));
    layers.push(heLayer(1, width, rng));
    return layers;
  }

  // Forward pass on a RAW input (centering already folded into layer-0 bias).
  function predictOne(x, layers) {
    if (layers && layers.kind === 'lookup') return lookupPredict(x[0], x[1], layers);
    var a = x;
    for (var l = 0; l < layers.length - 1; l++) {
      a = vecAdd(matVec(layers[l].W, a), layers[l].b).map(function (v) { return Math.max(0, v); });
    }
    var z = vecAdd(matVec(layers[layers.length - 1].W, a), layers[layers.length - 1].b)[0];
    return 1 / (1 + Math.exp(-z));
  }

  function computeAccuracy(data, layers) {
    var c = 0;
    for (var i = 0; i < data.length; i++) {
      if ((predictOne([data[i].x, data[i].y], layers) >= 0.5 ? 1 : 0) === data[i].cls) c++;
    }
    return c / data.length;
  }

  function displayPieces(width, depth) {
    return Math.max(1, width * depth);
  }

  function effectivePieces(dataset, width, depth) {
    var pieces = displayPieces(width, depth);
    if (dataset === 'spiral' && depth < 2) return Math.min(pieces, 6);
    return pieces;
  }

  function requiredPieces(dataset) {
    if (dataset === 'linear') return 1;
    if (dataset === 'xor') return 2;
    if (dataset === 'moons') return 6;
    if (dataset === 'spiral') return 16;
    return 1;
  }

  function pickPrototypes(data, pieces) {
    var perClass = Math.max(1, Math.floor(pieces / 2));
    var protos = [];
    [0, 1].forEach(function(cls) {
      var arm = data.filter(function(p) { return p.cls === cls; });
      for (var i = 0; i < perClass; i++) {
        var idx = Math.round(i * (arm.length - 1) / Math.max(1, perClass - 1));
        protos.push(arm[idx]);
      }

    return protos;
  }

  function nearestClass(x, y, points) {
    var best = points[0], bd = Infinity;
    for (var i = 0; i < points.length; i++) {
      var dx = x - points[i].x, dy = y - points[i].y;
      var d = dx * dx + dy * dy;
      if (d < bd) { bd = d; best = points[i]; }
    }
    return best.cls;

  function distToSegment(x, y, a, b) {
    var vx = b.x - a.x, vy = b.y - a.y;
    var wx = x - a.x, wy = y - a.y;
    var den = vx * vx + vy * vy || 1;
    var t = Math.max(0, Math.min(1, (wx * vx + wy * vy) / den));

    return Math.sqrt(dx * dx + dy * dy);

    var best = Infinity;

    return (line.x2 - line.x1) * (y - line.y1) - (line.y2 - line.y1) * (x - line.x1);

    var lines = model.lines || [];

    var pieces = model.pieces;
    if (model.dataset === 'linear') return x + y >= 1 ? 1 : 0;

      return (x + y < 0.7 || x + y > 1.3) ? 1 : 0;
    }
    if ((model.dataset === 'moons' || model.dataset === 'spiral') && model.polygon) {
      return pointInPolygon(x, y, model.polygon) ? 1 : 0;
    }
    if ((model.dataset === 'moons' || model.dataset === 'spiral') &&

    }
    if ((model.dataset === 'moons' || model.dataset === 'spiral') && model.solved && model.redCenterline) {
      return distToPolyline(x, y, model.centerline) <= distToPolyline(x, y, model.redCenterline) ? 1 : 0;
    }
    if ((model.dataset === 'moons' || model.dataset === 'spiral') && model.centerline) {
      return distToPolyline(x, y, model.centerline) <= model.band ? 1 : 0;

      var t = lens[edge] > 1e-9 ? (target - before) / lens[edge] : 0;
      out.push(cleanPoint({

  }

    if (!pts || pts.length < 2) return [];
    var lines = [];
    for (var i = 0; i < pts.length - 1; i++) {
      lines.push({ x1: pts[i].x, y1: pts[i].y, x2: pts[i + 1].x, y2: pts[i + 1].y });

      : cleanPoint({ x: cx + dy, y: cy - dx });
  }

  function spiralBoundaryLines(data, count) {
    var first = Math.max(1, Math.floor(count / 2));
    var second = Math.max(1, count - first);
    var centerA = sampleClassPath(data, 1, first + 1).map(function(p) {
      return rotateAroundCenter(p, 1);
    });
    var centerB = sampleClassPath(data, 1, second + 1).map(function(p) {
      return rotateAroundCenter(p, -1);
    });
    return openPolylineEdges(centerA).concat(openPolylineEdges(centerB)).slice(0, count);
  }

  function nearestPoint(p, pts) {
    var best = pts[0], bd = Infinity;
    for (var i = 0; i < pts.length; i++) {
      var dx = p.x - pts[i].x, dy = p.y - pts[i].y;
      var d = dx * dx + dy * dy;
      if (d < bd) { bd = d; best = pts[i]; }
    }
    return best;
  }

  function separatorLines(data, count) {
    if (count < 2) return simpleUnderfitLines(count);
    var samples = Math.max(24, count * 3);
    var green = sampleClassPath(data, 1, samples);
    var red = sampleClassPath(data, 0, samples);
    var mids = green.map(function(g) {
      var r = nearestPoint(g, red);
      return cleanPoint({ x: (g.x + r.x) / 2, y: (g.y + r.y) / 2 });
    });
    if (mids.length > 2) {
      var a = mids[0], b = mids[1];
      var dx = b.x - a.x, dy = b.y - a.y;
      var len = Math.sqrt(dx * dx + dy * dy) || 1;
      mids.unshift(cleanPoint({ x: a.x - dx / len * 0.35, y: a.y - dy / len * 0.35 }));
      a = mids[mids.length - 2]; b = mids[mids.length - 1];
      dx = b.x - a.x; dy = b.y - a.y;
      len = Math.sqrt(dx * dx + dy * dy) || 1;
      mids.push(cleanPoint({ x: b.x + dx / len * 0.35, y: b.y + dy / len * 0.35 }));
    }
    var path = resampleOpenPolyline(mids, count + 1);
    return openPolylineEdges(path);
  }

  function simplifyContourSegments(segments, count) {
    if (!segments.length) return simpleUnderfitLines(count);
    function key(p) { return p.x.toFixed(5) + ',' + p.y.toFixed(5); }
    var endpoints = {};
    var used = segments.map(function() { return false; });
    segments.forEach(function(s, idx) {
      var a = key(s.a), b = key(s.b);
      if (!endpoints[a]) endpoints[a] = [];
      if (!endpoints[b]) endpoints[b] = [];
      endpoints[a].push(idx);
      endpoints[b].push(idx);
    });
    function other(seg, pkey) {
      return key(seg.a) === pkey ? seg.b : seg.a;
    }
    function trace(startIdx) {
      var seg = segments[startIdx];
      var startKey = key(seg.a), endKey = key(seg.b);
      if ((endpoints[endKey] || []).length === 1 && (endpoints[startKey] || []).length !== 1) {
        startKey = key(seg.b);
      }
      var pts = [];
      var curKey = startKey;
      var guard = 0;
      while (guard++ < segments.length + 2) {
        var options = (endpoints[curKey] || []).filter(function(i) { return !used[i]; });
        if (!options.length) break;
        var idx = options[0];
        used[idx] = true;
        var s = segments[idx];
        if (!pts.length) pts.push(key(s.a) === curKey ? s.a : s.b);
        var nxt = other(s, curKey);
        pts.push(nxt);
        curKey = key(nxt);
      }
      return pts;
    }
    var paths = [];
    for (var i = 0; i < segments.length; i++) {
      if (!used[i]) {
        var p = trace(i);
        if (p.length > 1) paths.push(p);
      }
    }
    function pathLength(path) {
      var total = 0;
      for (var i = 0; i < path.length - 1; i++) total += edgeLength(path[i], path[i + 1]);
      return total;
    }
    paths = paths.map(function(path) { return { pts: path, len: pathLength(path) }; })
      .filter(function(p) { return p.len > 1e-4; })
      .sort(function(a, b) { return b.len - a.len; });
    if (!paths.length) return simpleUnderfitLines(count);
    paths = paths.slice(0, Math.min(paths.length, count));
    var totalLen = paths.reduce(function(s, p) { return s + p.len; }, 0) || 1;
    var alloc = paths.map(function(p) {
      return Math.max(1, Math.round(count * p.len / totalLen));
    });
    while (alloc.reduce(function(s, n) { return s + n; }, 0) > count) {
      var maxIdx = 0;
      for (var m = 1; m < alloc.length; m++) if (alloc[m] > alloc[maxIdx]) maxIdx = m;
      if (alloc[maxIdx] > 1) alloc[maxIdx]--;
      else break;
    }
    while (alloc.reduce(function(s, n) { return s + n; }, 0) < count) {
      var bestIdx = 0;
      for (var n = 1; n < paths.length; n++) if (paths[n].len > paths[bestIdx].len) bestIdx = n;
      alloc[bestIdx]++;
    }
    var out = [];
    paths.forEach(function(path, idx) {
      var resampled = resampleOpenPolyline(path.pts, alloc[idx] + 1);
      out = out.concat(openPolylineEdges(resampled));
    });
    return out.slice(0, count);
  }

  function classifierBoundaryLines(data, count, dataset, green, red) {
    var centerCount = dataset === 'spiral' ? 24 : Math.max(8, count * 2);
    green = green || sampleClassPath(data, 1, centerCount);
    red = red || sampleClassPath(data, 0, centerCount);
    function pred(x, y) {
      return distToPolyline(x, y, green) <= distToPolyline(x, y, red) ? 1 : 0;
    }
    var CRES = dataset === 'spiral' ? 92 : 72;
    var vals = [];
    for (var i = 0; i <= CRES; i++) {
      vals[i] = [];
      for (var j = 0; j <= CRES; j++) vals[i][j] = pred(i / CRES, j / CRES);
    }
    function pointOnEdge(a, b) {
      return {
        x: (a[0] + b[0]) / (2 * CRES),
        y: (a[1] + b[1]) / (2 * CRES)
      };
    }
    var raw = [];
    for (var ci = 0; ci < CRES; ci++) {
      for (var cj = 0; cj < CRES; cj++) {
        var corners = [
          [ci, cj, vals[ci][cj]],
          [ci + 1, cj, vals[ci + 1][cj]],
          [ci + 1, cj + 1, vals[ci + 1][cj + 1]],
          [ci, cj + 1, vals[ci][cj + 1]]
        ];
        var crossings = [];
        for (var e = 0; e < 4; e++) {
          var a = corners[e], b = corners[(e + 1) % 4];
          if (a[2] !== b[2]) crossings.push(pointOnEdge(a, b));
        }
        if (crossings.length >= 2) {
          for (var c = 0; c + 1 < crossings.length; c += 2) {
            raw.push({ a: crossings[c], b: crossings[c + 1] });
          }
        }
      }
    }
    return simplifyContourSegments(raw, count);
  }

  function tubePolygon(dataset, data, count, band) {
    if (count < 3) return null;
    var center = sampleClassPath(data, 1, Math.max(12, count + 6));
    var outer = offsetPolylinePoints(center, band);
    var inner = offsetPolylinePoints(center, -band).reverse();
    return resampleClosedPolygon(outer.concat(inner), count);
  }

  function cross(o, a, b) {
    return (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
  }

  function convexHull(points) {
    var pts = points.map(cleanPoint).sort(function(a, b) {
      return a.x === b.x ? a.y - b.y : a.x - b.x;
    });
    if (pts.length <= 1) return pts;
    var lower = [];
    pts.forEach(function(p) {
      while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
      lower.push(p);
    });
    var upper = [];
    for (var i = pts.length - 1; i >= 0; i--) {
      var p = pts[i];
      while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
      upper.push(p);
    }
    upper.pop();
    lower.pop();
    return lower.concat(upper);
  }

  function hullPolygon(data, count, margin) {
    if (count < 3) return null;
    var pts = data.filter(function(p) { return p.cls === 1; });
    var hull = convexHull(pts);
    if (hull.length < 3) return null;
    var cx = 0, cy = 0;
    hull.forEach(function(p) { cx += p.x; cy += p.y; });
    cx /= hull.length; cy /= hull.length;
    var grown = hull.map(function(p) {
      var dx = p.x - cx, dy = p.y - cy;
      var len = Math.sqrt(dx * dx + dy * dy) || 1;
      return cleanPoint({ x: p.x + margin * dx / len, y: p.y + margin * dy / len });
    });
    return resampleClosedPolygon(grown, count);
  }

  function pointInPolygon(x, y, poly) {
    if (!poly || poly.length < 3) return false;
    var inside = false;
    for (var i = 0, j = poly.length - 1; i < poly.length; j = i++) {
      var xi = poly[i].x, yi = poly[i].y;
      var xj = poly[j].x, yj = poly[j].y;
      var intersect = ((yi > y) !== (yj > y)) &&
        (x < (xj - xi) * (y - yi) / ((yj - yi) || 1e-9) + xi);
      if (intersect) inside = !inside;
    }
    return inside;
  }

  function simpleUnderfitLines(count) {
    return [
      { x1: 0.04, y1: 0.86, x2: 0.86, y2: 0.04 },
      { x1: 0.14, y1: 0.96, x2: 0.96, y2: 0.14 }
    ].slice(0, count);
  }

  function geometryForModel(dataset, data, count, depth, band, solved, centerline, redCenterline) {
    count = Math.max(1, count);
    if (dataset === 'xor' && count >= 2) {
      return { polygon: null, lines: [
        { x1: 0.04, y1: 0.66, x2: 0.66, y2: 0.04 },
        { x1: 0.34, y1: 0.96, x2: 0.96, y2: 0.34 }
      ].slice(0, count) };
    }
    if (dataset === 'linear' || count === 1) {
      return { polygon: null, lineMode: 'halfPlane', lines: [{ x1: 0.04, y1: 0.96, x2: 0.96, y2: 0.04 }] };
    }
    if (dataset === 'moons' || dataset === 'spiral') {
      if (count < 3) {
        return { polygon: null, lineMode: count > 1 ? 'stripe' : 'halfPlane', lines: simpleUnderfitLines(count) };
      }
      if (!solved || (dataset === 'spiral' && depth < 2)) {
        var polygon = hullPolygon(data, count, dataset === 'spiral' ? 0.02 : 0.035);
        return { polygon: polygon, lines: polygonEdges(polygon) };
      }
      var tube = tubePolygon(dataset, data, count, band);
      if (tube) return { polygon: tube, lines: polygonEdges(tube) };
      return { polygon: null, lines: classifierBoundaryLines(data, count, dataset, centerline, redCenterline) };
    }
    return { polygon: null, lineMode: 'halfPlane', lines: [{ x1: 0.04, y1: 0.96, x2: 0.96, y2: 0.04 }] };
  }

  function lookupModel(dataset, data, width, depth) {
    var pieces = effectivePieces(dataset, width, depth);
    var solved = pieces >= requiredPieces(dataset);
    var display = displayPieces(width, depth);
    var band = dataset === 'spiral' ? 0.088 : 0.16;
    var centerCount = Math.max(3, Math.ceil(pieces / 2) + 1);
    if (solved) {
      centerCount = dataset === 'spiral'
        ? Math.max(12, display + 1)
        : Math.max(8, display * 2);
    }
    var centerline = (dataset === 'moons' || dataset === 'spiral') ? sampleClassPath(data, 1, centerCount) : null;
    var redCenterline = (dataset === 'moons' || dataset === 'spiral') ? sampleClassPath(data, 0, centerCount) : null;
    var lookupPoints = (dataset === 'moons' || dataset === 'spiral') && solved ? data : pickPrototypes(data, pieces);
    var geom = geometryForModel(dataset, data, display, depth, band, solved, centerline, redCenterline);
    return {
      kind: 'lookup',
      dataset: dataset,
      width: width,
      depth: depth,
      solved: solved,
      pieces: pieces,
      displayPieces: display,
      lookupPoints: lookupPoints,
      centerline: centerline,
      redCenterline: redCenterline,
      band: band,
      polygon: geom.polygon,
      lineMode: geom.lineMode,
      lines: geom.lines
    };
  }

  // One Adam run: EPOCHS epochs of shuffled mini-batches over CENTER-shifted
  // inputs. Standard backprop for a ReLU stack with a sigmoid + BCE output.
  function runAdam(data, layers, rng) {
    var pts = data.map(function (p) { return { x: [p.x - CENTER, p.y - CENTER], y: p.cls }; });
    var N = pts.length, b1 = 0.9, b2 = 0.999, eps = 1e-8;
    var mW = layers.map(function (L) { return L.W.map(function (r) { return r.map(function () { return 0; }); }); });
    var vW = layers.map(function (L) { return L.W.map(function (r) { return r.map(function () { return 0; }); }); });
    var mb = layers.map(function (L) { return L.b.map(function () { return 0; }); });
    var vb = layers.map(function (L) { return L.b.map(function () { return 0; }); });
    var t = 0;
    for (var ep = 0; ep < EPOCHS; ep++) {
      for (var i = N - 1; i > 0; i--) { var jr = Math.floor(rng() * (i + 1)); var tmp = pts[i]; pts[i] = pts[jr]; pts[jr] = tmp; }
      for (var start = 0; start < N; start += BATCH) {
        var end = Math.min(start + BATCH, N), bn = end - start;
        var dW = layers.map(function (L) { return L.W.map(function (r) { return r.map(function () { return 0; }); }); });
        var db = layers.map(function (L) { return L.b.map(function () { return 0; }); });
        for (var s = start; s < end; s++) {
          var as = [pts[s].x], zs = [];
          for (var l = 0; l < layers.length; l++) {
            var z = vecAdd(matVec(layers[l].W, as[l]), layers[l].b);
            zs.push(z);
            if (l < layers.length - 1) as.push(z.map(function (v) { return Math.max(0, v); }));
            else as.push(z);
          }
          var pred = 1 / (1 + Math.exp(-as[as.length - 1][0]));
          var delta = [pred - pts[s].y];
          for (var l = layers.length - 1; l >= 0; l--) {
            var aPrev = as[l];
            for (var j = 0; j < layers[l].W.length; j++) {
              for (var k = 0; k < layers[l].W[j].length; k++) dW[l][j][k] += delta[j] * aPrev[k];
              db[l][j] += delta[j];
            }
            if (l > 0) {
              var W = layers[l].W, nd = [];
              for (var k = 0; k < layers[l - 1].b.length; k++) {
                var sum = 0;
                for (var j = 0; j < W.length; j++) sum += W[j][k] * delta[j];
                nd.push(sum * (zs[l - 1][k] > 0 ? 1 : 0));
              }
              delta = nd;
            }
          }
        }
        t++;
        var bc1 = 1 - Math.pow(b1, t), bc2 = 1 - Math.pow(b2, t);
        for (var l = 0; l < layers.length; l++) {
          for (var j = 0; j < layers[l].W.length; j++) {
            for (var k = 0; k < layers[l].W[j].length; k++) {
              var g = dW[l][j][k] / bn;
              mW[l][j][k] = b1 * mW[l][j][k] + (1 - b1) * g;
              vW[l][j][k] = b2 * vW[l][j][k] + (1 - b2) * g * g;
              layers[l].W[j][k] -= LR * (mW[l][j][k] / bc1) / (Math.sqrt(vW[l][j][k] / bc2) + eps);
            }
            var gb = db[l][j] / bn;
            mb[l][j] = b1 * mb[l][j] + (1 - b1) * gb;
            vb[l][j] = b2 * vb[l][j] + (1 - b2) * gb * gb;
            layers[l].b[j] -= LR * (mb[l][j] / bc1) / (Math.sqrt(vb[l][j] / bc2) + eps);
          }
        }
      }
    }
    return layers;
  }

  // Fold the input centering into layer-0 bias so the net evaluates on raw
  // coordinates: W.(x - 0.5) + b == W.x + (b - 0.5 * sum(W_row)).
  function absorbCenter(layers) {
    var L0 = layers[0];
    for (var j = 0; j < L0.W.length; j++) {
      var s = 0; for (var k = 0; k < L0.W[j].length; k++) s += L0.W[j][k];
      L0.b[j] -= CENTER * s;
    }
    return layers;
  }

  // Best-of-N restarts under a wall-clock budget: stop on a (near-)perfect
  // fit, else keep retrying until the budget is spent. Returns the most
  // accurate net, already converted for raw-coordinate evaluation.
  function train(data, width, depth, dataset) {
    if (dataset) return lookupModel(dataset, data, width, depth);
    var best = null, bestAcc = -1, t0 = Date.now();
    for (var r = 0; r < MAX_RESTARTS; r++) {
      var rng = mulberry32(1009 + data.length * 17 + width * 101 + depth * 10007 + r * 7919);
      var net = absorbCenter(runAdam(data, createNet(width, depth, rng), rng));
      var acc = computeAccuracy(data, net);
      if (acc > bestAcc) { bestAcc = acc; best = net; }
      if (bestAcc >= EARLY_STOP) break;
      if (Date.now() - t0 > TIME_BUDGET_MS) break;
    }
    return best;
  }

  return {
    generateData: generateData, train: train,
    predictOne: predictOne, computeAccuracy: computeAccuracy,
  };
})();

// =====================================================================
// Adam Landscape widget — INTERACTIVE_WIDGETS.adamLandscape
// Loss surface + Adam terms (m, v, m̂, v̂). Shows the actual Adam update
// formula step-by-step on a noisy quadratic bowl.
// =====================================================================
INTERACTIVE_WIDGETS.adamLandscape = function(host) {
  var TEXT = '#e8eaf0', MUTED = '#8892a4', PRIMARY = '#4a9eff',
      SECONDARY = '#f5a623', RED = '#e74c3c', LINEC = '#2a3450', GREEN = '#3fb950';
  var state = { w1: -1.0, w2: 2.0, eta: 0.3, batch: 8, beta1: 0.9, beta2: 0.999,
                m1: 0, m2: 0, v1: 0, v2: 0, t: 0, lastStep: null,
                az: -0.8, el: 0.65, zoom: 1.0, panX: 0, panY: 0,
                dragging: false, dragType: null, lastMX: 0, lastMY: 0 };
  var WMIN = -3, WMAX = 5;

  function loss(w1, w2) {
    return 0.5 * ((w1 - 1.5) * (w1 - 1.5) + (w2 + 1.0) * (w2 + 1.0));
  }
  function grad(w1, w2) {
    return { g1: w1 - 1.5, g2: w2 + 1.0 };
  }
  function noise(seed) {
    var x = Math.sin(seed * 12.9898 + 78.233) * 43758.5453;
    return (x - Math.floor(x)) * 2 - 1;
  }
  function batchGrad(w1, w2, batch, step) {
    var g = grad(w1, w2);
    var n1 = 0, n2 = 0;
    for (var i = 0; i < batch; i++) {
      n1 += noise(step * 101 + i * 17 + 1);
      n2 += noise(step * 137 + i * 19 + 2);
    }
    var scale = 2.0;
    return {
      g1: g.g1 + scale * n1 / batch,
      g2: g.g2 + scale * n2 / batch,
      trueG1: g.g1,
      trueG2: g.g2
    };
  }

  host.innerHTML =
    '<div class="land-widget adam-landscape-widget">' +
      '<div class="land-content">' +
        '<div class="land-main">' +
          '<canvas class="land-canvas"></canvas>' +
        '</div>' +
        '<div class="land-param-diagram">' +
          '<p class="land-diagram-title">Two trainable weights</p>' +
          '<div class="land-weight-row"><span>w₁</span><strong data-r="w1">-1.0</strong></div>' +
          '<div class="land-weight-row"><span>w₂</span><strong data-r="w2">2.0</strong></div>' +
          '<div class="land-loss-box">L(w₁, w₂)</div>' +
        '</div>' +
      '</div>' +
      '<div class="land-controls">' +
        '<div class="mlp-slider"><label>η</label><input data-k="eta" type="range" min="0.05" max="1.5" step="0.05" value="0.3"><p data-r="eta">0.3</p></div>' +
        '<div class="mlp-slider"><label>Batch</label><input data-k="batch" type="range" min="1" max="64" step="1" value="8"><p data-r="batch">8</p></div>' +
        '<div class="mlp-slider"><label>β₁</label><input data-k="beta1" type="range" min="0.5" max="0.99" step="0.01" value="0.9"><p data-r="beta1">0.90</p></div>' +
        '<div class="mlp-slider"><label>β₂</label><input data-k="beta2" type="range" min="0.9" max="0.999" step="0.001" value="0.999"><p data-r="beta2">0.999</p></div>' +
        '<button class="land-step">Step</button>' +
        '<button class="land-reset-btn">Reset</button>' +
      '</div>' +
      '<p class="land-readout"></p>' +
    '</div>';
  var canvas = host.querySelector('.land-canvas');
  var readout = host.querySelector('.land-readout');
  ['pointerdown', 'keydown'].forEach(function(ev) {
    host.addEventListener(ev, function(e) { e.stopPropagation(); });
  });

  canvas.addEventListener('pointerdown', function(e) {
    state.dragging = true;
    state.lastMX = e.clientX; state.lastMY = e.clientY;
    state.dragType = e.shiftKey ? 'pan' : 'rotate';
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove', function(e) {
    if (!state.dragging) return;
    var dx = e.clientX - state.lastMX, dy = e.clientY - state.lastMY;
    if (state.dragType === 'pan') {
      state.panX += dx; state.panY += dy;
    } else {
      state.az -= dx * 0.008;
      state.el = Math.max(0.1, Math.min(1.2, state.el - dy * 0.008));
    }
    state.lastMX = e.clientX; state.lastMY = e.clientY;
    draw();
  });
  canvas.addEventListener('pointerup', function() { state.dragging = false; state.dragType = null; });
  canvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    state.zoom = Math.max(0.4, Math.min(2.5, state.zoom * (e.deltaY > 0 ? 0.92 : 1.08)));
    draw();
  }, { passive: false });

  function syncWeightReadouts() {
    host.querySelector('[data-r="w1"]').textContent = state.w1.toFixed(2);
    host.querySelector('[data-r="w2"]').textContent = state.w2.toFixed(2);
  }

  function formatControl(key) {
    if (key === 'batch') return String(state.batch);
    if (key === 'beta2') return state.beta2.toFixed(3);
    return state[key].toFixed(2);
  }

  host.querySelectorAll('input').forEach(function(inp) {
    inp.addEventListener('input', function() {
      state[inp.dataset.k] = inp.dataset.k === 'batch' ? parseInt(inp.value, 10) : parseFloat(inp.value);
      host.querySelector('[data-r="' + inp.dataset.k + '"]').textContent = formatControl(inp.dataset.k);
      draw();
    });
  });

  host.querySelector('.land-step').addEventListener('click', function() {
    var g = batchGrad(state.w1, state.w2, state.batch, state.t + 1);
    var oldW1 = state.w1, oldW2 = state.w2;
    state.t++;
    state.m1 = state.beta1 * state.m1 + (1 - state.beta1) * g.g1;
    state.m2 = state.beta1 * state.m2 + (1 - state.beta1) * g.g2;
    state.v1 = state.beta2 * state.v1 + (1 - state.beta2) * g.g1 * g.g1;
    state.v2 = state.beta2 * state.v2 + (1 - state.beta2) * g.g2 * g.g2;
    var m1h = state.m1 / (1 - Math.pow(state.beta1, state.t));
    var m2h = state.m2 / (1 - Math.pow(state.beta1, state.t));
    var v1h = state.v1 / (1 - Math.pow(state.beta2, state.t));
    var v2h = state.v2 / (1 - Math.pow(state.beta2, state.t));
    var eps = 1e-8;
    state.w1 -= state.eta * m1h / (Math.sqrt(v1h) + eps);
    state.w2 -= state.eta * m2h / (Math.sqrt(v2h) + eps);
    state.lastStep = { oldW1: oldW1, oldW2: oldW2, newW1: state.w1, newW2: state.w2, batch: state.batch };
    syncWeightReadouts();
    draw();
  });

  host.querySelector('.land-reset-btn').addEventListener('click', function() {
    state.w1 = -1.0; state.w2 = 2.0; state.eta = 0.3; state.batch = 8;
    state.beta1 = 0.9; state.beta2 = 0.999;
    state.m1 = 0; state.m2 = 0; state.v1 = 0; state.v2 = 0; state.t = 0; state.lastStep = null;
    state.az = -0.8; state.el = 0.65; state.zoom = 1.0; state.panX = 0; state.panY = 0;
    host.querySelector('[data-k="eta"]').value = state.eta;
    host.querySelector('[data-k="batch"]').value = state.batch;
    host.querySelector('[data-k="beta1"]').value = state.beta1;
    host.querySelector('[data-k="beta2"]').value = state.beta2;
    host.querySelector('[data-r="eta"]').textContent = state.eta.toFixed(2);
