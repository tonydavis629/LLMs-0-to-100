<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLMs 0 to 100</title>

  <!-- Reveal.js core -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reset.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">

  <!-- Syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css">

  <!-- KaTeX math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}, {left: '\\(', right: '\\)', display: false}]});"></script>

  <!-- Module-specific <head> includes (e.g. Chart.js); empty for most modules -->
  

  <!-- Shared styles + per-module overrides, inlined by the build -->
  <style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

/* ===========================================
   CSS VARIABLES
   =========================================== */
:root {
  --background-color: #0a0e1a;
  --section-divider-bg: #0d1225;

  --heading-font: "Space Grotesk", Helvetica, sans-serif;
  --body-font: "Inter", Helvetica, sans-serif;
  --base-font-size: 32px;
  --text-size: 16pt;
  --h1-size: 48pt;
  --h2-size: 36pt;
  --h3-size: 24pt;
  --footnote-size: 11pt;

  --primary-color: #4a9eff;
  --secondary-color: #f5a623;
  --text-color: #e8eaf0;
  --muted-color: #8892a4;
  --line-color: #2a3450;

  --slide-padding: 60px;
  --slide-padding-top: 24px;
  --content-gap: 18px;

  --box-radius: 8px;
}

/* ===========================================
   BASE STYLES
   =========================================== */

.reveal {
  font-family: var(--body-font);
  font-size: var(--base-font-size);
}

.reveal strong,
.reveal b {
  font-weight: bold;
}

.reveal-viewport {
  background-color: var(--background-color);
}

.reveal-viewport.is-section-divider .slide-background.present {
  background-color: var(--section-divider-bg) !important;
}

.reveal h1,
.reveal h2,
.reveal h3,
.reveal h4,
.reveal h5,
.reveal h6 {
  font-family: var(--heading-font);
  text-transform: none;
  color: var(--text-color);
  font-weight: 600;
  line-height: 1.2;
}

.reveal h1 { font-size: var(--h1-size); }
.reveal h2 { font-size: var(--h2-size); margin-bottom: 0; }
.reveal h3 { font-size: var(--h3-size); }

.reveal p,
.reveal li,
.reveal td,
.reveal th,
.reveal blockquote {
  font-size: var(--text-size);
  color: var(--text-color);
  line-height: 1.5;
}

/* Vertical separation between newline-separated sentences on text slides.
   Scoped to a slide's top-level paragraphs (the prose flow); paragraphs
   nested inside components (terminal captions, figure cards, grid columns)
   keep their own tighter spacing so dense component slides do not overflow.
   Adjacent margins collapse, so the gap between two paragraphs is 0.9em. */
.reveal .slides section > p {
  margin: 0.4em 0 0.9em 0;
}

/* ===========================================
   LISTS
   =========================================== */

.reveal ul {
  list-style: none;
  padding-left: 0;
  margin: 15px 0;
}

.reveal ul li {
  position: relative;
  padding-left: 25px;
  margin-bottom: 10px;
}

.reveal ul li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0.6em;
  width: 8px;
  height: 8px;
  background: var(--primary-color);
  border-radius: 50%;
}

.reveal ul ul li::before {
  background: var(--muted-color);
  width: 6px;
  height: 6px;
}

.reveal blockquote p {
  font-size: inherit;
}

/* ===========================================
   SLIDE LAYOUT
   =========================================== */

.reveal .slides section {
  height: 100%;
  display: flex !important;
  flex-direction: column !important;
  padding: var(--slide-padding-top) var(--slide-padding) var(--slide-padding) var(--slide-padding) !important;
  box-sizing: border-box;
  text-align: left;
}

.reveal .slides section.stack {
  padding: 0 !important;
}

.reveal .slides section > .content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding-top: var(--content-gap);
  text-align: left;
}

.reveal .slides section > .footnote {
  position: absolute;
  bottom: 15px;
  left: var(--slide-padding);
  right: var(--slide-padding);
  font-size: var(--footnote-size);
  color: var(--muted-color);
}

/* ===========================================
   SECTION DIVIDERS
   =========================================== */

.reveal .slides section.section-divider {
  display: flex !important;
  flex-direction: column !important;
  justify-content: center !important;
  align-items: center !important;
  text-align: center;
}

.reveal .slides section.section-divider h1 {
  font-size: 56pt;
  text-align: center;
  color: var(--primary-color);
}

.reveal .slides section.section-divider p {
  font-size: 20pt;
  color: var(--muted-color);
}

/* ===========================================
   TEXT SIZE UTILITIES
   =========================================== */

.text-lg { font-size: 18pt !important; }
.text-xl { font-size: 20pt !important; }
.text-2xl { font-size: 24pt !important; }
.text-3xl { font-size: 28pt !important; }
.text-4xl { font-size: 32pt !important; }

.text-muted { color: var(--muted-color) !important; }
.text-center { text-align: center !important; }
.text-uppercase { text-transform: uppercase; letter-spacing: 0.1em; }
.font-light { font-weight: 300; }
.font-bold { font-weight: 600; }

/* ===========================================
   BLOCKQUOTES
   =========================================== */

.reveal blockquote {
  border-left: 4px solid var(--primary-color);
  padding-left: 20px;
  margin: 20px 0;
  font-style: italic;
  background: none;
  box-shadow: none;
  width: 100%;
  max-width: none;
}

.reveal blockquote cite {
  display: block;
  margin-top: 10px;
  font-style: normal;
  color: var(--muted-color);
}

/* ===========================================
   ACCENT UNDERLINE ON TITLES
   =========================================== */

.reveal .slides section > h2 {
  flex-shrink: 0;
  margin: 0;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--line-color);
}

/* ===========================================
   FIGURE CARD - for notable figures slides
   =========================================== */

.figure-card {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 40px;
  align-items: start;
}

.figure-card img {
  border-radius: var(--box-radius);
  width: 100%;
  box-shadow: 0 4px 20px rgba(74, 158, 255, 0.15);
}

.figure-card .figure-info h3 {
  margin: 0 0 5px 0;
  color: var(--secondary-color);
  font-size: 14pt;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* ===========================================
   ERA BADGE - for timeline labels
   =========================================== */

.era-badge {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 12pt;
  font-weight: 500;
}

.era-badge.summer {
  background: rgba(245, 166, 35, 0.2);
  color: var(--secondary-color);
}

.era-badge.winter {
  background: rgba(74, 158, 255, 0.15);
  color: #6cb4ff;
}

.era-badge.spring {
  background: rgba(80, 200, 120, 0.2);
  color: #50c878;
}

/* ===========================================
   HIGHLIGHT BOX
   =========================================== */

.highlight-box {
  background: rgba(74, 158, 255, 0.08);
  border: 1px solid rgba(74, 158, 255, 0.25);
  border-radius: var(--box-radius);
  padding: 20px 25px;
}

/* Exercise hint: a single fragment that reveals the whole hint at once.
   The wrapping .fragment div is what animates; this just sizes the text
   (matching the old text-lg intent) and removes the global paragraph
   margin so the one-line hint is not double-spaced. */
.reveal .hint-box p {
  font-size: 18pt;
  margin: 0;
}

/* ===========================================
   COURSE STRUCTURE
   =========================================== */

.course-summary {
  max-width: 1120px;
  margin: 0 0 16px 0;
  color: #f0f4fb;
  font-size: 18pt !important;
  line-height: 1.4 !important;
}

.course-track-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  align-items: stretch;
}

.module-track-card {
  background: rgba(74, 158, 255, 0.07);
  border: 1px solid rgba(74, 158, 255, 0.22);
  border-radius: var(--box-radius);
  padding: 20px 22px;
}

.module-track-kicker {
  font-size: 12pt;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--secondary-color);
  margin-bottom: 8px;
}

.module-track-card h3 {
  margin: 0 0 8px 0;
}

.module-track-intro {
  font-size: 14pt !important;
  color: #d7ddea !important;
  margin: 0 0 10px 0;
  line-height: 1.4 !important;
}

.compact-list {
  margin: 0;
}

.reveal ul.compact-list li {
  font-size: 16pt;
  line-height: 1.35;
  margin-bottom: 7px;
  padding-left: 20px;
}

.course-note {
  margin-top: 14px;
  color: #d7ddea;
  font-size: 15pt !important;
  line-height: 1.35 !important;
}

.course-glossary {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px 18px;
  margin-top: 14px;
}

.glossary-item {
  background: rgba(245, 166, 35, 0.08);
  border: 1px solid rgba(245, 166, 35, 0.18);
  border-radius: var(--box-radius);
  padding: 12px 14px;
}

.glossary-item strong {
  color: var(--secondary-color);
}

.glossary-item p {
  font-size: 13pt !important;
  color: #d7ddea !important;
  margin: 6px 0 0 0;
  line-height: 1.4;
}

/* ===========================================
   TERMINAL OUTPUT
   =========================================== */

.terminal-output {
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 0;
  max-width: 800px;
  margin: 0 auto;
  text-align: left;
}

.terminal-output .terminal-bar {
  background: #161b22;
  border-radius: 8px 8px 0 0;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.terminal-output .terminal-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
}

.terminal-output .terminal-dot.red { background: #ff5f57; }
.terminal-output .terminal-dot.yellow { background: #febc2e; }
.terminal-output .terminal-dot.green { background: #28c840; }

.terminal-output .terminal-title {
  color: #8b949e;
  font-family: monospace;
  font-size: 10pt;
  margin-left: 8px;
}

.terminal-output .terminal-body {
  padding: 15px 20px;
}

.terminal-output .terminal-body pre {
  margin: 0;
  background: none !important;
  box-shadow: none !important;
}

.reveal .terminal-output .terminal-body pre.terminal-pre {
  font-size: 11pt;
  line-height: 1.5;
  color: #e8eaf0;
  background: none !important;
  padding: 0;
  box-shadow: none !important;
  font-family: monospace;
}

.reveal .terminal-output .terminal-body pre.terminal-pre span {
  font-size: inherit !important;
  line-height: inherit !important;
  font-family: inherit !important;
}

.reveal .terminal-output .terminal-body pre.terminal-pre p {
  display: inline;
  font-size: inherit !important;
  line-height: inherit !important;
  font-family: inherit !important;
  margin: 0 !important;
  color: inherit;
}

.reveal .terminal-output .terminal-body pre code {
  font-size: 11pt;
  line-height: 1.5;
  color: #e8eaf0;
  background: none !important;
  padding: 0;
  box-shadow: none !important;
  font-family: monospace;
}

.terminal-output .terminal-body .prompt {
  color: #8b949e;
}

.terminal-output .terminal-body .success {
  color: #3fb950;
}

.terminal-output .terminal-body .header {
  font-weight: bold;
}

.terminal-output .terminal-body .skipped {
  color: #8b949e;
  font-style: italic;
}

/* ===========================================
   TURNING POINT SLIDE
   =========================================== */

.turning-point h2 {
  border-bottom-color: var(--secondary-color) !important;
}

/* ===========================================
   CODE BLOCKS
   =========================================== */

.reveal pre {
  margin-bottom: 0;
  width: 100%;
  box-sizing: border-box;
  box-shadow: none !important;
  background: none !important;
}

.reveal pre code {
  font-size: 14pt;
  line-height: 1.4;
  padding: 10px 20px;
  border-radius: var(--box-radius);
  background: rgba(20, 25, 45, 0.8);
  color: var(--text-color);
  max-height: 400px;
}

.reveal pre code .hljs-keyword,
.reveal pre code .hljs-built_in {
  color: #c792ea;
}

.reveal pre code .hljs-string {
  color: #c3e88d;
}

.reveal pre code .hljs-comment {
  color: #546e7a;
}

.reveal pre code .hljs-number {
  color: #f78c6c;
}

.reveal code {
  color: var(--text-color);
}

/* ===========================================
   MATH (KaTeX)
   =========================================== */

.katex {
  color: var(--text-color);
  font-size: 1.1em;
}

.katex-display {
  margin: 15px 0;
}

.katex-display > .katex {
  font-size: 1.3em;
}

/* ===========================================
   VIDEO CONTAINERS
   =========================================== */

.video-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.video-container video,
.video-container img {
  max-width: 100%;
  max-height: 100%;
  border-radius: var(--box-radius);
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
}

/* ===========================================
   SIDE QUEST BADGE
   =========================================== */

.side-quest-badge {
  display: inline-block;
  background: rgba(245, 166, 35, 0.15);
  color: var(--secondary-color);
  padding: 3px 12px;
  border-radius: 12px;
  font-size: 12pt;
  font-weight: 500;
  margin-bottom: 10px;
}

/* ===========================================
   TERMINAL OUTPUT - ANSI COLOR PALETTE
   Replaces inline `style="color:#..."` on spans
   inside .terminal-pre. A rule on the span itself
   overrides the color inherited from .terminal-pre.
   =========================================== */

.terminal-output .terminal-body .t-red    { color: #e06c75; }
.terminal-output .terminal-body .t-orange { color: #d19a66; }
.terminal-output .terminal-body .t-yellow { color: #e5c07b; }
.terminal-output .terminal-body .t-green  { color: #98c379; }
.terminal-output .terminal-body .t-cyan   { color: #56b6c2; }
.terminal-output .terminal-body .t-blue   { color: #61afef; }
.terminal-output .terminal-body .t-gray   { color: #8b949e; }
.terminal-output .terminal-body .t-fg     { color: #e8eaf0; }
.terminal-output .terminal-body .t-fail   { color: #e74c3c; }

.terminal-caption {
  margin-top: 15px;
  text-align: center;
}

/* ===========================================
   TIMELINE (module 1) - per-node structure
   Positional left/width and per-era colors stay
   inline; this captures the repeated boilerplate.
   =========================================== */

.tl-node  { position: absolute; transform: translateX(-50%); text-align: center; }
/* .reveal prefix needed: `.reveal p` (0,1,1) sets color/font-size and would
   otherwise beat a bare .tl-* class. The original used inline styles. */
.reveal .tl-label { font-size: 10pt; color: var(--muted-color); white-space: nowrap; margin: 0; }
.reveal .tl-year  { font-size: 11pt; font-weight: 600; margin: 2px 0 0 0; }
.tl-stem  { width: 1px; opacity: 0.5; margin: 2px auto 0; }
.tl-dot   { width: 10px; height: 10px; border-radius: 50%; margin: 0 auto; }

.tl-node.below .tl-stem  { margin: 0 auto; }
.tl-node.below .tl-year  { margin: 0; }
.tl-node.below .tl-label { margin: 2px 0 0 0; }

/* ===========================================
   CANONICAL SLIDE TYPES
   Backs the :::divider / :::columns / :::note /
   :::quiz / :::step / :::interactive fences so
   slides.md carries no inline layout styles.
   (.section-divider, .figure-card, .terminal-output,
    .hint-box are defined above and reused.)
   =========================================== */

/* :::columns - grid; template/gap/valign supplied by the build */
.reveal .slide-columns {
  display: grid;
  align-items: start;
  margin: 10px 0;
}

/* :::note - callout box (canonical replacement for .highlight-box) */
.reveal .note {
  background: rgba(74, 158, 255, 0.08);
  border: 1px solid rgba(74, 158, 255, 0.25);
  border-radius: var(--box-radius);
  padding: 20px 25px;
  margin: 20px 0;
}

.reveal .note p {
  font-size: 18pt;
  margin: 0;
}

.reveal .note p + p {
  margin-top: 0.6em;
}

/* :::note variant="hint" - lighter, boxless (also used inside :::step) */
.reveal .note.hint-box {
  background: none;
  border: none;
  padding: 0;
}

/* :::quiz - prompt scales up; its last line is the question */
.reveal .quiz-prompt p {
  font-size: 18pt;
  margin: 0 0 0.6em 0;
}

.reveal .quiz-prompt p:last-child {
  font-size: 24pt;
  color: var(--text-color);
  margin: 0.5em 0 0 0;
}

.reveal .quiz-answer {
  margin-top: 30px;
}

/* :::step - spacing between code, hint, and answer */
.reveal .hint-box {
  margin-top: 22px;
}

.reveal .hint-box + .note {
  margin-top: 8px;
  padding: 12px 18px;
}

/* :::interactive - widget fills the slide body like a video */
.reveal .interactive-host {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 0;
  width: 100%;
}

/* ===========================================
   FOLDING WIDGET  (:::interactive widget="folding")
   Linked input-space / hidden-space views with
   per-neuron weight & bias sliders.
   =========================================== */

.fold-widget {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 100%;
  height: 100%;
}

.fold-views {
  display: grid;
  grid-template-columns: 1fr 1fr 0.85fr;
  gap: 18px;
  flex: 1;
  min-height: 0;
}

.fold-view {
  display: flex;
  flex-direction: column;
  margin: 0;
  min-height: 0;
}

.reveal .fold-view figcaption {
  font-size: 14pt;
  color: var(--primary-color);
  font-weight: 600;
  text-align: center;
  margin-bottom: 6px;
}

.fold-canvas {
  flex: 1;
  min-height: 0;
  width: 100%;
  background: #0d1225;
  border: 1px solid var(--line-color);
  border-radius: var(--box-radius);
}

.fold-controls {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.fold-modes {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.fold-modes button {
  font-family: var(--body-font);
  font-size: 13pt;
  color: var(--text-color);
  background: rgba(74, 158, 255, 0.10);
  border: 1px solid rgba(74, 158, 255, 0.35);
  border-radius: 6px;
  padding: 6px 14px;
  cursor: pointer;
}

.fold-modes button.active {
  background: var(--primary-color);
  border-color: var(--primary-color);
  color: #0a0e1a;
  font-weight: 600;
}

.fold-modes button.fold-reset {
  background: rgba(245, 166, 35, 0.12);
  border-color: rgba(245, 166, 35, 0.40);
  color: var(--secondary-color);
}

.fold-sliders {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px 24px;
}

.fold-slider {
  display: grid;
  grid-template-columns: 70px 1fr 52px;
  align-items: center;
  gap: 10px;
}

.reveal .fold-slider label {
  font-size: 12pt;
  margin: 0;
  font-family: var(--body-font);
  font-weight: 600;
}

.fold-slider input[type="range"] {
  width: 100%;
  accent-color: var(--primary-color);
}

.reveal .fold-slider .fold-val {
  font-size: 12pt;
  color: var(--text-color);
  font-family: monospace;
  text-align: right;
  margin: 0;
}

.reveal .fold-readout {
  font-size: 13pt;
  color: var(--muted-color);
  text-align: center;
  margin: 0;
}

.reveal .fold-readout strong {
  color: var(--secondary-color);
}

/* ===========================================
   MLP BOUNDARY WIDGET  (:::interactive widget="mlpBoundary")
   =========================================== */

.mlp-widget {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 100%;
  height: 100%;
}

.mlp-canvas-wrap {
  flex: 1;
  min-height: 0;
}

.mlp-canvas,
.land-canvas {
  width: 100%;
  height: 100%;
  min-height: 0;
  min-width: 0;
  background: #0d1225;
  border: 1px solid var(--line-color);
  border-radius: var(--box-radius);
}

.mlp-controls,
.land-controls {
  display: grid;
  grid-template-columns: repeat(2, minmax(240px, 1fr));
  gap: 10px 24px;
  align-items: center;
}

.mlp-slider {
  display: grid;
  grid-template-columns: 70px 1fr 58px;
  align-items: center;
  gap: 10px;
}

.reveal .mlp-slider label,
.reveal .mlp-slider p {
  font-size: 12pt;
  margin: 0;
}

.reveal .mlp-slider label {
  color: var(--primary-color);
  font-weight: 600;
}

.mlp-slider input[type="range"] {
  width: 100%;
  accent-color: var(--primary-color);
}

.reveal .mlp-slider p {
  color: var(--text-color);

# LLMs 0 to 100

Module 3: Attention Mechanisms

From Fixed Windows to Learned Lookups

---

<!-- .slide: id="review-1" -->

## Review: Module 2

<div class="slide-columns" style="grid-template-columns: repeat(2, 1fr); gap: 30px;">

<div>

**The MLP**

A multi-layer perceptron applies repeated linear transformations with nonlinear activations between them:

$$\mathbf{h} = \sigma(W\mathbf{x} + \mathbf{b})$$

An MLP with enough hidden units can approximate any continuous function (universal approximation theorem).

</div>

<div>

**Limitations for Sequences**

An MLP over a fixed window of tokens treats each position identically, but:

- The context window is fixed: token 1 cannot directly inform token 50
- Flattening token vectors destroys the idea that the same pattern can appear in many positions
- Parameter count grows with context length
- There is no direct mechanism for one token to select information from another token

</div>

</div>

---

<!-- .slide: id="review-2" -->

## Review: Why the Architecture Matters

<div class="slide-columns" style="grid-template-columns: repeat(2, 1fr); gap: 30px;">

<div>

**From Module 2**

The single neuron could not solve XOR because a linear boundary cannot separate entangled classes. The fix was a hidden layer with a nonlinearity &mdash; the architecture had to match the structure of the problem.

</div>

<div>

**Same Principle, Bigger Scale**

Language has structure that an MLP does not match:

- Every token can depend on any earlier token, not just its neighbors
- The same syntactic pattern ("the ___") appears at every position
- The relevant context length varies per token

**The architecture must match the structure of the data.**

</div>

</div>

<!-- .slide: id="divider-why-attention" class="section-divider" data-state="is-section-divider" -->

# Why Attention?

From fixed windows to selective retrieval


---

<!-- .slide: id="mlp-failure" -->

## Predicting the Next Word with an MLP

The task: given the words so far, predict the next one. An MLP reads a **fixed window** of the most recent tokens, flattens them into one long vector, and maps that to a distribution over the vocabulary.

<!-- .slide: id="mlp-rigid-positions" -->

<section id="mlp-rigid">
  <h2>Rigid Positionality: Weights Are Bound to Slots</h2>
  <div class="interactive-host" data-widget="mlpRigid"></div>

<!-- .slide: id="mlp-two-failures" -->

## Two Things the MLP Cannot Do

<div class="slide-columns" style="grid-template-columns: repeat(2, 1fr); gap: 30px;">

<div>

**Rigid positionality**

Each slot connects to its own weights. The word "the" in slot 1 and "the" in slot 4 are processed by completely different parameters. Whatever the model learns about "the" at one position must be relearned from scratch at every other position.

</div>

<div>

**No selective retrieval**

To predict "mat", the useful context is "sat" and "cat". But the MLP flattens the whole window into one vector and treats every slot equally. There is no mechanism for one token to reach out and pull information from another.

</div>

</div>

<div class="note">

The architecture must match the data. Language needs variable-length context, weight sharing across positions, and a way to selectively retrieve information. An MLP over a fixed window provides none of these.

</div>

<!-- .slide: id="fixed-context-bottleneck" -->

## The Fixed-Context Bottleneck

Recurrent models (RNNs, LSTMs) handle variable length by reading tokens one at a time and compressing everything seen so far into a **single hidden state vector**.

<div class="note">

**Problem:** no matter how long the input, all of it must fit through one fixed-size bottleneck. The model has to decide what to keep before it knows what will be needed later. Early tokens fade as the state is overwritten.

</div>

## Bahdanau, Cho &amp; Bengio <!-- .element: class="fragment fade-in" -->

<div class="fragment fade-in">

### Made Attention a Central Mechanism

- Dzmitry Bahdanau, Kyunghyun Cho, and Yoshua Bengio (2014)
- "Neural Machine Translation by Jointly Learning to Align and Translate"
- Their translation model learned to **align** each output word to the most relevant input words
- Instead of one compressed vector, the decoder could look back at every input representation directly
- Attention began as a fix for the fixed-size bottleneck, then became a first-class mechanism

</div>

</div>

The learned projections that turn the intuition into an operation

# Softmax

Turning scores into probabilities


---

<!-- .slide: id="softmax-purpose" -->

## From Logits to a Distribution

Softmax is the function that has been quietly doing the normalization step in every attention layer. It takes a vector of raw scores (**logits**) and turns them into a probability distribution:

$$\text{softmax}(z)_i = \frac{e^{z_i}}{\sum_j e^{z_j}}$$
<div style="text-align: center; margin: 8px 0;">
<svg viewBox="0 0 820 230" width="100%" style="max-height: 220px;">
  <g font-size="12" text-anchor="middle" font-weight="600">
    <text x="145" y="22" fill="#f5a623">raw scores z</text>
    <text x="410" y="22" fill="#f5a623">positive scores e^z</text>
    <text x="675" y="22" fill="#4a9eff">probabilities</text>
  </g>
  <g font-size="12" text-anchor="middle">
    <text x="54" y="67" fill="#e8eaf0">cat</text>
    <text x="54" y="117" fill="#e8eaf0">sat</text>
    <text x="54" y="167" fill="#e8eaf0">mat</text>

<!-- .slide: id="softmax-temperature" -->

## Temperature

Dividing the logits by a **temperature** $T$ before softmax controls how peaked the distribution is:

$$p_i = \text{softmax}(z / T)_i$$

<div class="slide-columns" style="grid-template-columns: repeat(3, 1fr); gap: 20px;">

<div>

**$T < 1$**

Sharper. The model commits to its top choice. More deterministic text.

</div>

<div>

**$T = 1$**

The distribution exactly as the model produced it.

</div>

<div>

**$T > 1$**

Flatter. More of the probability mass spreads to other tokens. More varied, riskier text.

</div>

</div>

<div class="note">

The same scaling idea appeared in attention: dividing $QK^T$ by $\sqrt{d_k}$ is a fixed temperature that keeps the softmax from saturating as the dimension grows.

</div>

# Scaled Dot-Product Attention

Compare, scale, normalize, retrieve


---

<!-- .slide: id="scaling-problem" -->

## Why Scale by $\sqrt{d_k}$?

Dot products grow with dimension. For $d_k = 64$, the expected magnitude of $\mathbf{q} \cdot \mathbf{k}$ is about 8; for $d_k = 1024$, it is about 32.

When inputs to softmax are large, the output becomes **sharply peaked** &mdash; one entry near 1, the rest near 0. This produces tiny gradients that make training unstable.

<div class="note">

Dividing by $\sqrt{d_k}$ keeps the variance of the dot product roughly constant regardless of dimension. This preserves gradient flow and stabilizes training.

</div>

---

<!-- .slide: id="scaled-softmax" -->

## Scaled Softmax

The attention weight from query $i$ to key $j$:

$$\alpha_{ij} = \frac{\exp\left(\mathbf q_i \cdot \mathbf k_j / \sqrt{d_k}\right)}{\sum_{j'} \exp\left(\mathbf q_i \cdot \mathbf k_{j'} / \sqrt{d_k}\right)}$$

Each row of the attention matrix sums to 1. The weights form a **soft selection** over all tokens.

<div class="note">

**Without scaling:** for large $d_k$, the softmax saturates and gradients vanish. With scaling, the distribution stays smooth and learning proceeds. A small but critical engineering detail.

</div>

---

<!-- .slide: id="attention-output" -->

## The Attention Output

The output for each token is a weighted average of the value vectors:

$$\mathbf o_i = \sum_j \alpha_{ij} \mathbf v_j$$

<div class="slide-columns" style="grid-template-columns: repeat(2, 1fr); gap: 30px;">

<div>

**Interpretation**

- Each output vector $\mathbf o_i$ is a mixture of all value vectors
- The mixture weights $\alpha_{ij}$ come from query-key compatibility
- If token $i$ attends strongly to token $j$, its output is dominated by $\mathbf v_j$

</div>

<div>

**Properties**

- Different tokens can attend to different subsets of the sequence
- The same token can be attended to by many others
- The output dimension matches the value dimension, not the sequence length

</div>

</div>

## Attention Is Not Just for Text

The same mechanism works on any sequence. In a vision-language model, each text token can attend to **regions of an image** &mdash; the bright areas are where attention concentrates.

<!-- .slide: id="full-attention-formula" -->

## The Complete Formula

Scaled dot-product attention in one line:

$$\text{Attention}(Q, K, V) = \text{softmax}\left(\frac{QK^T}{\sqrt{d_k}}\right) V$$

Compare, normalize, retrieve. Three matrix operations. No recurrence, no convolution, no fixed-size bottleneck. The model learns what to look at.

<!-- .slide: id="why-causal" -->

## Why Causal Masking?

In a language model, we predict the next token given all previous tokens:

$$P(w_t \mid w_1, w_2, \ldots, w_{t-1})$$

<div class="slide-columns" style="grid-template-columns: repeat(2, 1fr); gap: 30px;">

<div>

**During training**

A sequence of length $n$ gives many supervised examples at once:

$$w_1 \rightarrow w_2,\quad w_1,w_2 \rightarrow w_3,\quad \ldots$$

The causal mask lets the model train all positions in parallel while keeping each prediction from seeing its own answer.

</div>

<div>

**During inference**

Future tokens do not exist. The model predicts one token, appends it to the context, then feeds the longer sequence back in to predict the next token.

</div>

</div>

<div class="note">

Causal masking makes the training setup match autoregressive generation: every token can use only itself and earlier tokens, never a future answer.

</div>

---

<!-- .slide: id="multi-head-mechanics" -->

## Multi-Head Mechanics

Each head $h$ has its own projections and computes attention independently:

$$\text{head}_h = \text{Attention}(XW_Q^h, XW_K^h, XW_V^h)$$

The heads are concatenated and projected back through $W_O$:

$$\text{MultiHead}(X) = \text{Concat}(\text{head}_1, \ldots, \text{head}_H) W_O$$

<div class="note">

**Compute budget:** the total projection size across all heads is kept equal to $d_{\text{model}}$. With 8 heads and $d_{\text{model}} = 512$, each head uses $d_k = 64$. Multi-head attention is not more expensive than single-head &mdash; it is the same compute, split into independent patterns.

</div>

<!-- .slide: id="divider-positional" class="section-divider" data-state="is-section-divider" -->

# Positional Embeddings

Teaching the model that order matters


---

<!-- .slide: id="permutation-equivariance" -->

## Attention Ignores Order

Self-attention compares every token to every other token, but the comparison does not depend on **where** the tokens sit. Shuffle the inputs and the outputs come back in exactly the same shuffle &mdash; the operation is **permutation equivariant**.

<div class="note">

**This is a problem.** "dog bites man" and "man bites dog" contain the same bag of tokens. With no position information, attention treats them identically. It learns *what to look at* but not *where things are*.

</div>

---

<!-- .slide: id="permutation-demo" -->

<section id="perm-shuffle">

  <div class="interactive-host" data-widget="permutationShuffle"></div>
</section>

---

<!-- .slide: id="adding-position" -->

## The Fix: Add a Position Signal

If the tokens carry no order, we give each position its own signature and **add it to the token embedding** before attention ever runs:

$$X_{\text{pos}} = X + P$$

<div style="text-align: center; margin: 8px 0;">
<svg viewBox="0 0 720 130" width="100%" style="max-height: 120px;">
  <g font-size="12" text-anchor="middle" font-weight="600">
    <rect x="40" y="40" width="120" height="40" rx="5" fill="#0d1225" stroke="#4a9eff" stroke-width="1.5"/><text x="100" y="65" fill="#e8eaf0">token embedding</text>
    <text x="100" y="100" fill="#8892a4" font-size="11" font-weight="400">what the word is</text>
    <text x="195" y="65" fill="#e8eaf0" font-size="22">+</text>
    <rect x="230" y="40" width="120" height="40" rx="5" fill="#0d1225" stroke="#f5a623" stroke-width="1.5"/><text x="290" y="65" fill="#e8eaf0">position signal</text>
    <text x="290" y="100" fill="#8892a4" font-size="11" font-weight="400">where it sits</text>
    <text x="385" y="65" fill="#e8eaf0" font-size="22">=</text>
    <rect x="420" y="40" width="150" height="40" rx="5" fill="#0d1225" stroke="#3fb950" stroke-width="1.5"/><text x="495" y="65" fill="#e8eaf0">position-aware input</text>
  </g>
</svg>
</div>

Now two identical words at different positions arrive at attention as **different vectors**, so "dog bites man" is no longer the same as "man bites dog". The open question: what should $P$ look like?

---

<!-- .slide: id="sinusoidal" -->

## Sinusoidal Positional Encodings

A common fixed pattern makes each dimension of $P$ a sine or cosine wave, with a different frequency in each dimension.

$$PE_{(pos, 2i)} = \sin\left(\frac{pos}{10000^{2i/d}}\right) \qquad PE_{(pos, 2i+1)} = \cos\left(\frac{pos}{10000^{2i/d}}\right)$$

<div class="slide-columns" style="grid-template-columns: repeat(2, 1fr); gap: 30px;">

<div>

**Low dimensions** use high frequencies &mdash; they flip quickly from token to token, encoding fine position.

</div>

<div>

**High dimensions** use low frequencies &mdash; they change slowly, encoding coarse position over long spans.

</div>

</div>

No parameters to learn, and the pattern extends to sequence lengths never seen in training.

<!-- .slide: id="learned-and-other" -->

## Learned and Relative Schemes

<div class="slide-columns" style="grid-template-columns: repeat(2, 1fr); gap: 30px;">

<div>

**Learned positional embeddings**

A trainable table with one vector per position, added like any embedding:

$$X_{\text{pos}} = X + P, \quad P \in \mathbb{R}^{L \times d}$$

Simple and effective, but limited to the maximum length seen in training. Used in BERT and GPT-2.

</div>

<div>

**Relative and bias-based schemes**

What often matters is the **distance** between tokens, not absolute index.

- **Relative position** encodings inject a term that depends on $m - n$
- **ALiBi** adds a distance penalty straight onto the attention scores
- These extrapolate to longer contexts more gracefully

</div>

</div>

---

<!-- .slide: id="rope" -->

## RoPE: Position as Rotation

**RoPE** (Rotary Position Embedding, Su et al. 2021) encodes position by **rotating** each query and key by an angle proportional to its position. The dot product between a query at position $m$ and a key at position $n$ then depends only on the **relative offset** $m - n$.

# Memory and Compute

The cost of every token seeing every other token


---

<!-- .slide: id="n-squared-cost" -->

## The $O(n^2)$ Cost

Attention builds an $n \times n$ score matrix: every token compared against every other token. That matrix is the bottleneck.

    </g>

## Tri Dao <!-- .element: class="fragment fade-in" -->

<div class="fragment fade-in">

### Made Exact Attention Fast

- Tri Dao and collaborators (2022): FlashAttention
- Observed that materializing the full $n \times n$ matrix in slow GPU memory (HBM) is the real bottleneck
- FlashAttention computes **exact** attention without ever writing the full matrix to HBM
- IO-aware: it tiles the computation to keep intermediate results in fast on-chip SRAM
- Identical result to standard attention, but 2-4x faster and 5-20x less memory
- FlashAttention-2 and -3 pushed further on newer GPUs

</div>

</div>

</div>

<!-- .slide: id="mitigations" -->

## Modern Mitigations

Several approaches reduce the $O(n^2)$ cost without sacrificing too much quality:

<div class="slide-columns" style="grid-template-columns: repeat(2, 1fr); gap: 30px;">

<div>

**FlashAttention**

Computes exact attention without materializing the full matrix. Same result, far less memory traffic.

</div>

<div>

**Sliding-window attention**

Each token attends only to a local window of neighbors (plus a few global tokens). Reduces the effective $n$.

</div>

<div>

**Multi-query attention (MQA)**

All heads share one K and V projection. Only Q is per-head. Shrinks the KV cache.

</div>

<div>

**Grouped-query attention (GQA)**

A compromise: heads are divided into groups that share K and V. Used in LLaMA 2/3.

</div>

</div>

<!-- .slide: id="divider-kv-cache" class="section-divider" data-state="is-section-divider" -->

# KV Cache

Reusing work during generation


---

<!-- .slide: id="kv-cache-idea" -->

## The KV Cache

During autoregressive inference, the model generates one token at a time, and each new token attends to **every** token before it. Done naively, every step re-projects the keys and values for all previous tokens &mdash; the same vectors, computed again and again.

The keys and values for past tokens never change. So compute them once and **store** them.

<!-- .slide: id="kv-cache-tradeoffs" -->

## KV Cache Tradeoffs

The KV cache is a classic memory-vs-compute tradeoff:

<div class="slide-columns" style="grid-template-columns: repeat(2, 1fr); gap: 30px;">

<div>

**Speed win**

Each generation step does $O(1)$ projection work instead of $O(n)$. Total generation cost drops from $O(n^2)$ to $O(n)$.

</div>

<div>

**Memory cost**

The cache stores $2 \times n_{\text{layers}} \times n_{\text{heads}} \times n_{\text{tokens}} \times d_k$ floats. For a 70B model with 128K context, that can be tens of gigabytes.

</div>

</div>

<div class="note">

**KV cache memory is a major limit** for long context and large-batch serving. This is why MQA and GQA exist &mdash; fewer unique K and V heads means a smaller cache.

</div>

---

<!-- .slide: id="attention-sinks" -->

## Attention Sinks

In a trained language model, a large share of every head's attention lands on the **very first token** &mdash; even when that token is something contentless like a start marker.

<div style="text-align: center; margin: 6px 0;">

</div>

**Why would the model dump attention on a token that carries no relevant meaning?**

<div class="fragment note">

Softmax weights must sum to 1, so a head always has to put its weight **somewhere**. When a head has nothing useful to attend to on a given token, it needs a no-op target to dump the leftover mass. Under causal masking, the first token is the one position visible to **every** later token, which makes it the natural sink. Xiao et al. (2023, StreamingLLM) showed that simply keeping these first tokens in the cache stabilizes very long generation.

</div>

---

<!-- .slide: id="attention-maps" -->

## Attention Maps Are Not Always Explanations

Attention weights are a useful diagnostic &mdash; they show where the model is looking. But high attention does not prove causal importance.

<div class="slide-columns" style="grid-template-columns: repeat(2, 1fr); gap: 30px;">

<div>

**Attention weights can suggest hypotheses**

- A pronoun attending to its antecedent is a real, interpretable pattern
- Useful for debugging and building intuition

</div>

<div>

**But high attention is not proof**

- Attention is one of many operations in the network
- The model can route information through other pathways
- Ablation tests are needed for stronger causal claims

</div>

</div>

**The distinction:** visualization suggests hypotheses; ablation tests confirm them.

<!-- .slide: id="quiz-q1" -->

## Q1: Learned Lookup

<div class="quiz-prompt">

In the attention mechanism, the query, key, and value projections are learned during training. If you froze these projections at random initialization (never trained them), what would the attention weights look like, and why?

</div>

<div class="fragment note quiz-answer">

**Answer:** The attention weights would be approximately uniform &mdash; each token would attend equally to all other tokens. Random projections produce query and key vectors that are approximately orthogonal, so all dot products $QK^T$ are roughly equal, and softmax assigns nearly equal weight to every position. The learning is what makes the attention pattern **selective** rather than uniform.

</div>

---

<!-- .slide: id="quiz-q2" -->

## Q2: Causal Masking and Training

<div class="quiz-prompt">

A student proposes training a language model without a causal mask, arguing that "seeing future tokens during training will help the model learn faster." Explain why this approach fails at inference time.

</div>

<div class="fragment note quiz-answer">

**Answer:** During inference, the model generates tokens one at a time and cannot see future tokens (they do not exist yet). If the model was trained with bidirectional attention, it learned to rely on future context that will not be available at inference time. The model's predictions would degrade because it is missing information it was trained to expect. Causal masking ensures the training and inference information constraints match.

</div>

---

<!-- .slide: id="quiz-q3" -->

## Q3: Positional Information

<div class="quiz-prompt">

You feed the sentence "the cat sat on the mat" into a self-attention layer with positional embeddings removed. You then reverse the sentence to "mat the on sat cat the" and feed it in again. How do the attention patterns compare, and what does this tell you?

</div>

<div class="fragment note quiz-answer">

**Answer:** Without positional information, the attention patterns are identical up to the permutation of tokens. Self-attention is permutation equivariant: if you permute the input, the output is the same permutation of the original output. The model cannot distinguish "the cat sat" from "sat cat the" because it has no way to know which token came first. Positional embeddings break this symmetry by giving each position a unique signature.

</div>

---

<!-- .slide: id="quiz-q4" -->

## Q4: O(n^2) Scaling

<div class="quiz-prompt">

A model supports a 128K-token context. If you doubled the context to 256K tokens, by what factor does the attention computation cost increase? Why is this a bigger problem for per-token feed-forward layers?

</div>

<div class="fragment note quiz-answer">

**Answer:** The attention cost increases by a factor of 4 (from $O(n^2)$ to $O((2n)^2) = O(4n^2)$). The feed-forward layers process each token independently, so their cost is $O(n)$ &mdash; doubling context doubles the feed-forward cost. The $O(n^2)$ attention cost is why long context is disproportionately expensive, and why techniques like FlashAttention, sliding-window attention, and sparse attention patterns are active research areas.

</div>

---

<!-- .slide: id="quiz-q5" -->

## Q5: KV Cache Trade-offs

<div class="quiz-prompt">

A model has 32 layers, 32 attention heads per layer, and $d_k = 128$ per head. How many floats are stored in the KV cache for a 4096-token sequence? If you switch from multi-head attention to grouped-query attention with 4 groups, what is the reduction factor?

</div>

<div class="fragment note quiz-answer">

**Answer:** With multi-head attention: $2 \times 32 \times 32 \times 4096 \times 128 = 1,073,741,824$ floats (about 4 GB in float32). The "2" accounts for both K and V. With GQA and 4 groups, K and V are shared within each group of 8 heads, so the cache for K and V shrinks by a factor of 8: $2 \times 32 \times 4 \times 4096 \times 128 \approx 134$ million floats (about 512 MB). The reduction factor is 8, equal to the number of heads per group.

</div>

      ctx.strokeStyle = COL.secondary; ctx.lineWidth = 2;
      ctx.setLineDash([5, 3]);
      rounded(ctx, winX, stripY - 22, step * 4 - 12, 44, 6); ctx.stroke();
      ctx.setLineDash([]);

      var slotCx = [];
      for (var i = 0; i < n; i++) {
        var cx = x0 + i * step;
        var inWin = (i >= state.start && i < state.start + 4);
        var slot = i - state.start;
        if (inWin) slotCx[slot] = cx;
        ctx.fillStyle = COL.bg;
        var tracked = (i === trackIdx);
        ctx.strokeStyle = tracked ? COL.secondary : (inWin ? COL.text : COL.line);
        ctx.lineWidth = tracked ? 2.5 : 1.4;
        rounded(ctx, cx - bw / 2, stripY - 16, bw, 32, 5); ctx.fill(); ctx.stroke();
        ctx.fillStyle = inWin ? COL.text : COL.muted;
        ctx.font = '600 14px Inter, sans-serif';
        ctx.fillText(words[i], cx, stripY + 5);
      }

      // weight blocks row
      var wbY = H - 86;
      ctx.font = '600 12px Inter, sans-serif';
      for (var s = 0; s < 4; s++) {
        if (slotCx[s] === undefined) continue;
        var c = slotCx[s];
        // arrow from windowed word down to weight block
        ctx.strokeStyle = SLOTC[s]; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(c, stripY + 18); ctx.lineTo(c, wbY - 2); ctx.stroke();
        ctx.fillStyle = 'rgba(255,255,255,0.04)';
        ctx.strokeStyle = SLOTC[s];
        rounded(ctx, c - 36, wbY, 72, 44, 6); ctx.fill(); ctx.stroke();
        ctx.fillStyle = SLOTC[s];
        ctx.fillText('slot ' + (s + 1), c, wbY + 18);
        ctx.fillText('W' + (s + 1), c, wbY + 36);
      }

      // tracked word annotation
      var trackSlot = trackIdx - state.start;
      ctx.font = '600 13px Inter, sans-serif';
      if (trackSlot >= 0 && trackSlot < 4) {
        var tc = slotCx[trackSlot];
        ctx.fillStyle = COL.secondary;
        ctx.fillText('"sat" here', tc, wbY - 16);
        readout.innerHTML = '"sat" now sits in <strong>slot ' + (trackSlot + 1) +
          '</strong>, processed by weight block <strong>W' + (trackSlot + 1) +
          '</strong>. Slide it and it meets entirely different parameters &mdash; nothing it learned transfers.';
      }
    }
    draw();
    return { resize: draw };
  }

  // ===================================================================
  // WIDGET: attentionHeatmap — NxN attention weights for a sentence
  // ===================================================================
  function attentionHeatmap(host) {
    var examples = {
      a: {
        tokens: ['the', 'cat', 'sat', 'on', 'the', 'mat'],
        sel: 2,
        M: [
          [0.00, 0.34, 0.18, 0.12, 0.28, 0.08],
          [0.14, 0.00, 0.42, 0.16, 0.08, 0.20],
          [0.06, 0.46, 0.00, 0.30, 0.08, 0.10],
          [0.08, 0.12, 0.50, 0.00, 0.20, 0.10],
          [0.30, 0.08, 0.12, 0.22, 0.00, 0.28],
          [0.26, 0.24, 0.30, 0.12, 0.08, 0.00]
        ]
      },
      b: {
        tokens: ['alice', 'gave', 'bob', 'her', 'book'],
        sel: 3,
        M: [
          [0.00, 0.20, 0.25, 0.30, 0.25],
          [0.25, 0.00, 0.35, 0.20, 0.20],
          [0.20, 0.40, 0.00, 0.15, 0.25],
          [0.60, 0.15, 0.10, 0.00, 0.15],
          [0.35, 0.20, 0.10, 0.35, 0.00]
        ]
      }
    };
    var state = { key: 'a', sel: examples.a.sel };

    host.innerHTML =
      '<div class="m3-widget">' +
        '<div class="m3-canvas-wrap"><canvas class="m3-canvas"></canvas></div>' +
        '<div class="m3-controls">' +
          '<button class="m3-btn active" data-ex="a">"the cat sat on the mat"</button>' +
          '<button class="m3-btn" data-ex="b">"alice gave bob her book"</button>' +
        '</div>' +
        '<p class="m3-readout"></p>' +
      '</div>';
    var canvas = host.querySelector('.m3-canvas');
    var readout = host.querySelector('.m3-readout');
    stop(host);

    host.querySelectorAll('[data-ex]').forEach(function (b) {
      b.addEventListener('click', function () {
        state.key = b.getAttribute('data-ex');
        state.sel = examples[state.key].sel;
        host.querySelectorAll('[data-ex]').forEach(function (x) { x.classList.toggle('active', x === b); });
        draw();
      });
    });

    var layout = null;
    canvas.addEventListener('click', function (e) {
      if (!layout) return;
      var rect = canvas.getBoundingClientRect();
      var my = e.clientY - rect.top;
      var row = Math.floor((my - layout.oy) / layout.cell);
      if (row >= 0 && row < layout.n) { state.sel = row; draw(); }
    });

    function draw() {
      var f = fit(canvas); if (!f) return;
      var ctx = f.ctx, W = f.w, H = f.h;
      ctx.clearRect(0, 0, W, H);
      var ex = examples[state.key];
      var toks = ex.tokens, M = ex.M, n = toks.length;
      var pad = 64;
      var avail = Math.min(W - pad - 40, H - pad - 30);
      var cell = avail / n;
      var ox = pad + (W - pad - 40 - n * cell) / 2;
      var oy = pad;
      layout = { ox: ox, oy: oy, cell: cell, n: n };

      ctx.font = '12px Inter, sans-serif';
      // column (key) labels
      ctx.fillStyle = COL.secondary; ctx.textAlign = 'center';
      ctx.fillText('keys (attended to)', ox + n * cell / 2, 22);
      for (var j = 0; j < n; j++) {
        ctx.fillStyle = COL.secondary;
        ctx.fillText(toks[j], ox + j * cell + cell / 2, oy - 8);
      }
      // row (query) labels
      ctx.textAlign = 'right';
      for (var i = 0; i < n; i++) {
        ctx.fillStyle = (i === state.sel) ? COL.secondary : COL.primary;
        ctx.fillText(toks[i], ox - 8, oy + i * cell + cell / 2 + 4);
      }
      ctx.save();
      ctx.translate(ox - 58, oy + n * cell / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.textAlign = 'center'; ctx.fillStyle = COL.primary;
      ctx.fillText('queries', 0, 0);
      ctx.restore();

      // cells
      for (var r = 0; r < n; r++) {
        for (var c = 0; c < n; c++) {
          var w = M[r][c];
          ctx.fillStyle = (r === c)
            ? 'rgba(13,18,37,0.95)'
            : 'rgba(74,158,255,' + (0.08 + 0.9 * w).toFixed(3) + ')';
          ctx.fillRect(ox + c * cell + 1, oy + r * cell + 1, cell - 2, cell - 2);
          ctx.fillStyle = (r === c) ? COL.muted : COL.text; ctx.textAlign = 'center';
          ctx.font = '11px Inter, sans-serif';
          ctx.fillText(w.toFixed(2), ox + c * cell + cell / 2, oy + r * cell + cell / 2 + 4);
        }
      }
      // highlight selected query row
      ctx.strokeStyle = COL.secondary; ctx.lineWidth = 2.5;
      ctx.strokeRect(ox, oy + state.sel * cell, n * cell, cell);

      // readout: top attended key for selected query
      var row = M[state.sel];
      var best = 0; for (var k = 1; k < n; k++) if (row[k] > row[best]) best = k;
      readout.innerHTML = 'Click a row to pick a query. <strong>"' + toks[state.sel] +
        '"</strong> attends most to <strong>"' + toks[best] + '"</strong> (' +
        (row[best] * 100).toFixed(0) + '%). The diagonal is set to 0 here, and each row sums to 1.';
    }
    draw();
    return { resize: draw };
  }

  // ===================================================================
  // WIDGET: permutationShuffle — order does not change attention
  // ===================================================================
  function permutationShuffle(host) {
    var ids = ['dog', 'bites', 'man'];
    // affinity by token identity (row-normalized), independent of position
    var AFF = normalizeRows([
      [0.20, 0.30, 0.50],  // dog -> dog, bites, man
      [0.45, 0.10, 0.45],  // bites
      [0.50, 0.30, 0.20]   // man
    ]);
    var perms = [[0, 1, 2], [2, 1, 0], [1, 2, 0], [2, 0, 1]];
    var state = { p: 0 };

    host.innerHTML =
      '<div class="m3-widget">' +
        '<div class="m3-canvas-wrap"><canvas class="m3-canvas"></canvas></div>' +
        '<div class="m3-controls">' +
          '<button class="m3-btn m3-primary" data-act="shuffle">Reorder tokens</button>' +
          '<button class="m3-btn m3-reset" data-act="reset">Reset</button>' +
        '</div>' +
        '<p class="m3-readout"></p>' +
      '</div>';
    var canvas = host.querySelector('.m3-canvas');
    var readout = host.querySelector('.m3-readout');
    stop(host);
    host.querySelector('[data-act="shuffle"]').addEventListener('click', function () {
      state.p = (state.p + 1) % perms.length; draw();
    });
    host.querySelector('[data-act="reset"]').addEventListener('click', function () {
      state.p = 0; draw();
    });

    function draw() {
      var f = fit(canvas); if (!f) return;
      var ctx = f.ctx, W = f.w, H = f.h;
      ctx.clearRect(0, 0, W, H);
      var perm = perms[state.p];
      var n = 3;
      var order = perm.map(function (k) { return ids[k]; });

      // token row
      ctx.textAlign = 'center';
      ctx.fillStyle = COL.muted; ctx.font = '13px Inter, sans-serif';
      ctx.fillText('current order', W / 2, 24);
      var tw = 96, gap = 18, totalW = n * tw + (n - 1) * gap;
      var tx = (W - totalW) / 2;
      for (var i = 0; i < n; i++) {
        ctx.fillStyle = COL.bg; ctx.strokeStyle = COL.primary; ctx.lineWidth = 1.5;
        rounded(ctx, tx + i * (tw + gap), 36, tw, 34, 6); ctx.fill(); ctx.stroke();
        ctx.fillStyle = COL.text; ctx.font = '600 15px Inter, sans-serif';
        ctx.fillText(order[i], tx + i * (tw + gap) + tw / 2, 58);
      }

      // attention matrix in current order
      var cell = Math.min(96, (H - 130) / n);
      var mW = n * cell;
      var ox = (W - mW) / 2, oy = 96 + ((H - 96) - (n * cell + 24)) / 2;
      ctx.font = '12px Inter, sans-serif';
      for (var j = 0; j < n; j++) {
        ctx.fillStyle = COL.secondary; ctx.textAlign = 'center';
        ctx.fillText(order[j], ox + j * cell + cell / 2, oy - 8);
        ctx.fillStyle = COL.primary; ctx.textAlign = 'right';
        ctx.fillText(order[j], ox - 8, oy + j * cell + cell / 2 + 4);
      }
      for (var r = 0; r < n; r++) {
        for (var c = 0; c < n; c++) {
          var w = AFF[perm[r]][perm[c]];
          ctx.fillStyle = 'rgba(74,158,255,' + (0.10 + 0.85 * w).toFixed(3) + ')';
          ctx.fillRect(ox + c * cell + 1, oy + r * cell + 1, cell - 2, cell - 2);
          ctx.fillStyle = COL.text; ctx.textAlign = 'center'; ctx.font = '11px Inter, sans-serif';
          ctx.fillText(w.toFixed(2), ox + c * cell + cell / 2, oy + r * cell + cell / 2 + 4);
        }
      }
      // highlight the dog->man pair wherever it now sits
      var dr = perm.indexOf(0), dc = perm.indexOf(2);
      ctx.strokeStyle = COL.secondary; ctx.lineWidth = 2.5;
      ctx.strokeRect(ox + dc * cell, oy + dr * cell, cell, cell);

      readout.innerHTML = 'attention("dog" &rarr; "man") = <strong>' +
        AFF[0][2].toFixed(2) + '</strong> in every ordering. Reorder the tokens and the value is unchanged &mdash; <strong>order carries no information</strong>.';
    }
    draw();
    return { resize: draw };
  }

  // ===================================================================
  // WIDGET: positionalEncoding — sinusoidal heatmap + distance signal
  // ===================================================================
  function positionalEncoding(host) {
    var state = { d: 32, exp: 4, L: 40 };

    host.innerHTML =
      '<div class="m3-widget">' +
        '<div class="m3-dual">' +
          '<div class="m3-canvas-wrap"><canvas class="m3-canvas pe-heat"></canvas></div>' +
          '<div class="m3-canvas-wrap"><canvas class="m3-canvas pe-sim"></canvas></div>' +
        '</div>' +
        '<div class="m3-sliders">' +
          '<div class="m3-slider"><label>d_model</label><input type="range" min="8" max="64" step="8" value="32" data-k="d"><p class="m3-val">32</p></div>' +
          '<div class="m3-slider"><label>base 10^</label><input type="range" min="2" max="5" step="1" value="4" data-k="exp"><p class="m3-val">4</p></div>' +
        '</div>' +
        '<p class="m3-readout"></p>' +
      '</div>';
    var heat = host.querySelector('.pe-heat');
    var sim = host.querySelector('.pe-sim');
    var readout = host.querySelector('.m3-readout');
    stop(host);
    host.querySelectorAll('input[type="range"]').forEach(function (inp) {
      inp.addEventListener('input', function () {
        state[inp.getAttribute('data-k')] = parseInt(inp.value, 10);
        inp.parentElement.querySelector('.m3-val').textContent = inp.value;
        draw();
      });
    });

    function pe(pos, i, d, base) {
      var denom = Math.pow(base, (2 * Math.floor(i / 2)) / d);
      var angle = pos / denom;
      return (i % 2 === 0) ? Math.sin(angle) : Math.cos(angle);
    }

    function draw() {
      var base = Math.pow(10, state.exp);
      var d = state.d, L = state.L;
      // ---- heatmap ----
      var f = fit(heat); if (!f) return;
      var ctx = f.ctx, W = f.w, H = f.h;
      ctx.clearRect(0, 0, W, H);
      ctx.textAlign = 'center'; ctx.fillStyle = COL.muted; ctx.font = '12px Inter, sans-serif';
      ctx.fillText('encoding value (x = sequence position, y = dimension)', W / 2, 16);
      var ox = 46, oy = 28, gw = W - ox - 14, gh = H - oy - 30;
      var cw = gw / L, ch = gh / d;
      for (var p = 0; p < L; p++) {
        for (var i = 0; i < d; i++) {
          var v = pe(p, i, d, base);
          ctx.fillStyle = v >= 0
            ? 'rgba(74,158,255,' + (0.12 + 0.85 * v).toFixed(3) + ')'
            : 'rgba(245,166,35,' + (0.12 + 0.85 * (-v)).toFixed(3) + ')';
          ctx.fillRect(ox + p * cw, oy + i * ch, cw + 0.5, ch + 0.5);
        }
      }
      ctx.fillStyle = COL.muted; ctx.textAlign = 'right';
      ctx.fillText('dim 0', ox - 4, oy + 8);
      ctx.fillText('dim ' + (d - 1), ox - 4, oy + gh);
      ctx.textAlign = 'center';
      ctx.fillText('pos 0', ox + cw / 2 + 4, H - 8);
      ctx.fillText('pos ' + (L - 1), ox + gw - cw, H - 8);

      // ---- similarity vs distance ----
      var g = fit(sim); if (!g) return;
      var c2 = g.ctx, W2 = g.w, H2 = g.h;
      c2.clearRect(0, 0, W2, H2);
      c2.textAlign = 'center'; c2.fillStyle = COL.muted; c2.font = '12px Inter, sans-serif';
      c2.fillText('similarity to position 0 as distance grows', W2 / 2, 16);
      var px = 40, py = 28, pw = W2 - px - 16, ph = H2 - py - 28;
      // axes
      c2.strokeStyle = COL.line; c2.lineWidth = 1;
      c2.beginPath(); c2.moveTo(px, py); c2.lineTo(px, py + ph); c2.lineTo(px + pw, py + ph); c2.stroke();
      // compute dot products PE(0).PE(k)
      var vals = [];
      for (var k = 0; k < L; k++) {
        var dot = 0;
        for (var ii = 0; ii < d; ii++) dot += pe(0, ii, d, base) * pe(k, ii, d, base);
        vals.push(dot);
      }
      var maxv = vals[0] || 1;
      c2.strokeStyle = COL.primary; c2.lineWidth = 2;
      c2.beginPath();
      for (var kk = 0; kk < L; kk++) {
        var xx = px + (kk / (L - 1)) * pw;
        var yy = py + ph - (vals[kk] / maxv) * ph;
        if (kk === 0) c2.moveTo(xx, yy); else c2.lineTo(xx, yy);
      }
      c2.stroke();
      c2.fillStyle = COL.muted; c2.textAlign = 'left';
      c2.fillText('0', px, py + ph + 16);
      c2.textAlign = 'right'; c2.fillText('distance ' + (L - 1), px + pw, py + ph + 16);
      c2.save();
      c2.translate(12, py + ph / 2);
      c2.rotate(-Math.PI / 2);
      c2.textAlign = 'center';
      c2.fillText('similarity', 0, 0);
      c2.restore();

      readout.innerHTML = 'd_model = <strong>' + d + '</strong>, base = <strong>' + base.toLocaleString() +
        '</strong>. The heatmap shows positions across the x-axis and dimensions down the y-axis. The right plot compares each position to position 0; nearby positions tend to be more similar, giving attention a distance signal.';
    }
    draw();
    return { resize: draw };
  }

  // ===================================================================
  // WIDGET: softmaxExplorer — logits to a distribution, with temperature
  // ===================================================================
  function softmaxExplorer(host) {
    var toks = ['mat', 'rug', 'sofa', 'roof', 'sky'];
    var state = { logits: [3.2, 2.6, 1.4, 0.9, -0.3], T: 1.0 };

    var sliderHTML = '';
    toks.forEach(function (t, i) {
      sliderHTML += '<div class="m3-slider"><label>logit "' + t + '"</label>' +
        '<input type="range" min="-2" max="6" step="0.1" value="' + state.logits[i] + '" data-i="' + i + '">' +
        '<p class="m3-val">' + state.logits[i].toFixed(1) + '</p></div>';
    });
    sliderHTML += '<div class="m3-slider"><label>temperature</label>' +
      '<input type="range" min="0.2" max="3" step="0.1" value="1" data-t="1"><p class="m3-val">1.0</p></div>';

    host.innerHTML =
      '<div class="m3-widget">' +
        '<div class="m3-canvas-wrap"><canvas class="m3-canvas"></canvas></div>' +
        '<div class="m3-sliders">' + sliderHTML + '</div>' +
        '<p class="m3-readout"></p>' +
      '</div>';
    var canvas = host.querySelector('.m3-canvas');
    var readout = host.querySelector('.m3-readout');
    stop(host);
    host.querySelectorAll('input[data-i]').forEach(function (inp) {
      inp.addEventListener('input', function () {
        state.logits[parseInt(inp.getAttribute('data-i'), 10)] = parseFloat(inp.value);
        inp.parentElement.querySelector('.m3-val').textContent = parseFloat(inp.value).toFixed(1);
        draw();
      });
    });
    host.querySelector('input[data-t]').addEventListener('input', function () {
      state.T = parseFloat(this.value);
      this.parentElement.querySelector('.m3-val').textContent = state.T.toFixed(1);
      draw();
    });

    function softmax(z, T) {
      var m = Math.max.apply(null, z);
      var ex = z.map(function (v) { return Math.exp((v - m) / T); });
      var s = ex.reduce(function (a, b) { return a + b; }, 0);
      return ex.map(function (v) { return v / s; });
    }

    function draw() {
      var f = fit(canvas); if (!f) return;
      var ctx = f.ctx, W = f.w, H = f.h;
      ctx.clearRect(0, 0, W, H);
      var n = toks.length;
      var p = softmax(state.logits, state.T);
      var colW = (W - 80) / n;
      var midY = H / 2;
      ctx.textAlign = 'center';

      // top: logits ; bottom: probabilities
      ctx.font = '12px Inter, sans-serif'; ctx.fillStyle = COL.muted;
      ctx.fillText('logits (raw scores)', 70, 18);
      ctx.fillText('probabilities (after softmax)', 110, midY + 16);

      var maxL = 6, minL = -2;
      var topH = midY - 40;
      for (var i = 0; i < n; i++) {
        var cx = 60 + i * colW + colW / 2;
        // logit bar (above midline)
        var lh = ((state.logits[i] - minL) / (maxL - minL)) * topH;
        ctx.fillStyle = 'rgba(245,166,35,0.55)';
        ctx.fillRect(cx - colW * 0.3, midY - 24 - lh, colW * 0.6, lh);
        ctx.fillStyle = COL.text; ctx.font = '11px Inter, sans-serif';
        ctx.fillText(state.logits[i].toFixed(1), cx, midY - 28 - lh);
        // token label at midline
        ctx.fillStyle = COL.primary; ctx.font = '600 13px Inter, sans-serif';
        ctx.fillText(toks[i], cx, midY - 6);
        // prob bar (below midline)
        var botH = H - midY - 50;
        var ph = p[i] * botH;
        ctx.fillStyle = 'rgba(74,158,255,' + (0.35 + 0.6 * p[i]).toFixed(3) + ')';
        ctx.fillRect(cx - colW * 0.3, midY + 24, colW * 0.6, ph);
        ctx.fillStyle = COL.text; ctx.font = '11px Inter, sans-serif';
        ctx.fillText((p[i] * 100).toFixed(0) + '%', cx, midY + 24 + ph + 14);
      }
      ctx.strokeStyle = COL.line; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(30, midY); ctx.lineTo(W - 20, midY); ctx.stroke();

      var top = 0; for (var k = 1; k < n; k++) if (p[k] > p[top]) top = k;
      readout.innerHTML = 'Temperature <strong>' + state.T.toFixed(1) + '</strong>: top token is <strong>"' +
        toks[top] + '"</strong> at <strong>' + (p[top] * 100).toFixed(0) +
        '%</strong>. Lower temperature sharpens the peak; higher temperature flattens it.';
    }
    draw();
    return { resize: draw };
  }

  // ===================================================================
  // WIDGET: kvCache — recompute every step vs cache and reuse
  // ===================================================================
  function kvCache(host) {
    var toks = ['the', 'cat', 'sat', 'on', 'the', 'mat'];
    var N = toks.length;
    var state = { t: 1 };

    host.innerHTML =
      '<div class="m3-widget">' +
        '<div class="m3-canvas-wrap"><canvas class="m3-canvas"></canvas></div>' +
        '<div class="m3-controls">' +
          '<button class="m3-btn m3-primary" data-act="next">Generate next token</button>' +
          '<button class="m3-btn m3-reset" data-act="reset">Reset</button>' +
        '</div>' +
        '<p class="m3-readout"></p>' +
      '</div>';
    var canvas = host.querySelector('.m3-canvas');
    var readout = host.querySelector('.m3-readout');
    stop(host);
    host.querySelector('[data-act="next"]').addEventListener('click', function () {
      if (state.t < N) state.t++; draw();
    });
    host.querySelector('[data-act="reset"]').addEventListener('click', function () {
      state.t = 1; draw();
    });

    function panel(ctx, x0, y0, pw, ph, title, cached) {
      ctx.textAlign = 'center';
      ctx.fillStyle = cached ? COL.green : COL.secondary;
      ctx.font = '600 14px Inter, sans-serif';
      ctx.fillText(title, x0 + pw / 2, y0);
      var cell = Math.min((pw - 30) / N, (ph - 50) / N);
      var gx = x0 + (pw - cell * N) / 2, gy = y0 + 28;
      // column labels (positions)
      ctx.font = '10px Inter, sans-serif'; ctx.fillStyle = COL.muted;
      for (var c = 0; c < N; c++) ctx.fillText(toks[c], gx + c * cell + cell / 2, gy - 5);
      var computed = 0;
      for (var s = 0; s < state.t; s++) {
        for (var c2 = 0; c2 <= s; c2++) {

      lens.push(d);
      perimeter += d;
    }
    if (!isFinite(perimeter) || perimeter < 1e-6) return null;
    var out = [];
    var edge = 0, before = 0;
    for (var s = 0; s < count; s++) {
      var target = s * perimeter / count;
      while (edge < lens.length - 1 && before + lens[edge] < target) {
        before += lens[edge];
        edge++;
      }
      var a = poly[edge], b = poly[(edge + 1) % poly.length];
      var t = lens[edge] > 1e-9 ? (target - before) / lens[edge] : 0;
      out.push(cleanPoint({
        x: a.x + (b.x - a.x) * t,
        y: a.y + (b.y - a.y) * t
      }));
    }
    return out;
  }

  function polygonEdges(poly) {
    if (!poly || poly.length < 2) return [];
    var lines = [];
    for (var i = 0; i < poly.length; i++) {
      var a = poly[i], b = poly[(i + 1) % poly.length];
      lines.push({ x1: a.x, y1: a.y, x2: b.x, y2: b.y });
    }
    return lines;
  }

  function resampleOpenPolyline(pts, count) {
    if (!pts || pts.length < 2) return null;
    count = Math.max(2, count);
    var lens = [], total = 0;
    for (var i = 0; i < pts.length - 1; i++) {
      var d = edgeLength(pts[i], pts[i + 1]);
      lens.push(d);
      total += d;
    }
    if (!isFinite(total) || total < 1e-6) return null;
    var out = [];
    var edge = 0, before = 0;
    for (var s = 0; s < count; s++) {
      var target = s * total / Math.max(1, count - 1);
      while (edge < lens.length - 1 && before + lens[edge] < target) {
        before += lens[edge];
        edge++;
      }
      var a = pts[edge], b = pts[edge + 1];
      var t = lens[edge] > 1e-9 ? (target - before) / lens[edge] : 0;
      out.push(cleanPoint({
        x: a.x + (b.x - a.x) * t,
        y: a.y + (b.y - a.y) * t
      }));
    }
    return out;
  }

  function openPolylineEdges(pts) {
    if (!pts || pts.length < 2) return [];
    var lines = [];
    for (var i = 0; i < pts.length - 1; i++) {
      lines.push({ x1: pts[i].x, y1: pts[i].y, x2: pts[i + 1].x, y2: pts[i + 1].y });
    }
    return lines;
  }

  function rotateAroundCenter(p, dir) {
    var cx = 0.5, cy = 0.5;
    var dx = p.x - cx, dy = p.y - cy;
    return dir > 0
      ? cleanPoint({ x: cx - dy, y: cy + dx })
      : cleanPoint({ x: cx + dy, y: cy - dx });
  }

  function spiralBoundaryLines(data, count) {
    var first = Math.max(1, Math.floor(count / 2));
    var second = Math.max(1, count - first);
    var centerA = sampleClassPath(data, 1, first + 1).map(function(p) {
      return rotateAroundCenter(p, 1);
    });
    var centerB = sampleClassPath(data, 1, second + 1).map(function(p) {
      return rotateAroundCenter(p, -1);
    });
    return openPolylineEdges(centerA).concat(openPolylineEdges(centerB)).slice(0, count);
  }

  function nearestPoint(p, pts) {
    var best = pts[0], bd = Infinity;
    for (var i = 0; i < pts.length; i++) {
      var dx = p.x - pts[i].x, dy = p.y - pts[i].y;
      var d = dx * dx + dy * dy;
      if (d < bd) { bd = d; best = pts[i]; }
    }
    return best;
  }

  function separatorLines(data, count) {
    if (count < 2) return simpleUnderfitLines(count);
    var samples = Math.max(24, count * 3);
    var green = sampleClassPath(data, 1, samples);
    var red = sampleClassPath(data, 0, samples);
    var mids = green.map(function(g) {
      var r = nearestPoint(g, red);
      return cleanPoint({ x: (g.x + r.x) / 2, y: (g.y + r.y) / 2 });
    });
    if (mids.length > 2) {
      var a = mids[0], b = mids[1];
      var dx = b.x - a.x, dy = b.y - a.y;
      var len = Math.sqrt(dx * dx + dy * dy) || 1;
      mids.unshift(cleanPoint({ x: a.x - dx / len * 0.35, y: a.y - dy / len * 0.35 }));
      a = mids[mids.length - 2]; b = mids[mids.length - 1];
      dx = b.x - a.x; dy = b.y - a.y;
      len = Math.sqrt(dx * dx + dy * dy) || 1;
      mids.push(cleanPoint({ x: b.x + dx / len * 0.35, y: b.y + dy / len * 0.35 }));
    }
    var path = resampleOpenPolyline(mids, count + 1);
    return openPolylineEdges(path);
  }

  function simplifyContourSegments(segments, count) {
    if (!segments.length) return simpleUnderfitLines(count);
    function key(p) { return p.x.toFixed(5) + ',' + p.y.toFixed(5); }
    var endpoints = {};
    var used = segments.map(function() { return false; });
    segments.forEach(function(s, idx) {
      var a = key(s.a), b = key(s.b);
      if (!endpoints[a]) endpoints[a] = [];
      if (!endpoints[b]) endpoints[b] = [];
      endpoints[a].push(idx);
      endpoints[b].push(idx);
    });
    function other(seg, pkey) {
      return key(seg.a) === pkey ? seg.b : seg.a;
    }
    function trace(startIdx) {
      var seg = segments[startIdx];
      var startKey = key(seg.a), endKey = key(seg.b);
      if ((endpoints[endKey] || []).length === 1 && (endpoints[startKey] || []).length !== 1) {
        startKey = key(seg.b);
      }
      var pts = [];
      var curKey = startKey;
      var guard = 0;
      while (guard++ < segments.length + 2) {
        var options = (endpoints[curKey] || []).filter(function(i) { return !used[i]; });
        if (!options.length) break;
        var idx = options[0];
        used[idx] = true;
        var s = segments[idx];
        if (!pts.length) pts.push(key(s.a) === curKey ? s.a : s.b);
        var nxt = other(s, curKey);
        pts.push(nxt);
        curKey = key(nxt);
      }
      return pts;
    }
    var paths = [];
    for (var i = 0; i < segments.length; i++) {
      if (!used[i]) {
        var p = trace(i);
        if (p.length > 1) paths.push(p);
      }
    }
    function pathLength(path) {
      var total = 0;
      for (var i = 0; i < path.length - 1; i++) total += edgeLength(path[i], path[i + 1]);
      return total;
    }
    paths = paths.map(function(path) { return { pts: path, len: pathLength(path) }; })
      .filter(function(p) { return p.len > 1e-4; })
      .sort(function(a, b) { return b.len - a.len; });
    if (!paths.length) return simpleUnderfitLines(count);
    paths = paths.slice(0, Math.min(paths.length, count));
    var totalLen = paths.reduce(function(s, p) { return s + p.len; }, 0) || 1;
    var alloc = paths.map(function(p) {
      return Math.max(1, Math.round(count * p.len / totalLen));
    });
    while (alloc.reduce(function(s, n) { return s + n; }, 0) > count) {
      var maxIdx = 0;
      for (var m = 1; m < alloc.length; m++) if (alloc[m] > alloc[maxIdx]) maxIdx = m;
      if (alloc[maxIdx] > 1) alloc[maxIdx]--;
      else break;
    }
    while (alloc.reduce(function(s, n) { return s + n; }, 0) < count) {
      var bestIdx = 0;
      for (var n = 1; n < paths.length; n++) if (paths[n].len > paths[bestIdx].len) bestIdx = n;
      alloc[bestIdx]++;
    }
    var out = [];
    paths.forEach(function(path, idx) {
      var resampled = resampleOpenPolyline(path.pts, alloc[idx] + 1);
      out = out.concat(openPolylineEdges(resampled));
    });
    return out.slice(0, count);
  }

  function classifierBoundaryLines(data, count, dataset, green, red) {
    var centerCount = dataset === 'spiral' ? 24 : Math.max(8, count * 2);
    green = green || sampleClassPath(data, 1, centerCount);
    red = red || sampleClassPath(data, 0, centerCount);
    function pred(x, y) {
      return distToPolyline(x, y, green) <= distToPolyline(x, y, red) ? 1 : 0;
    }
    var CRES = dataset === 'spiral' ? 92 : 72;
    var vals = [];
    for (var i = 0; i <= CRES; i++) {
      vals[i] = [];
      for (var j = 0; j <= CRES; j++) vals[i][j] = pred(i / CRES, j / CRES);
    }
    function pointOnEdge(a, b) {
      return {
        x: (a[0] + b[0]) / (2 * CRES),
        y: (a[1] + b[1]) / (2 * CRES)
      };
    }
    var raw = [];
    for (var ci = 0; ci < CRES; ci++) {
      for (var cj = 0; cj < CRES; cj++) {
        var corners = [
          [ci, cj, vals[ci][cj]],
          [ci + 1, cj, vals[ci + 1][cj]],
          [ci + 1, cj + 1, vals[ci + 1][cj + 1]],
          [ci, cj + 1, vals[ci][cj + 1]]
        ];
        var crossings = [];
        for (var e = 0; e < 4; e++) {
          var a = corners[e], b = corners[(e + 1) % 4];
          if (a[2] !== b[2]) crossings.push(pointOnEdge(a, b));
        }
        if (crossings.length >= 2) {
          for (var c = 0; c + 1 < crossings.length; c += 2) {
            raw.push({ a: crossings[c], b: crossings[c + 1] });
          }
        }
      }
    }
    return simplifyContourSegments(raw, count);
  }

  function tubePolygon(dataset, data, count, band) {
    if (count < 3) return null;
    var center = sampleClassPath(data, 1, Math.max(12, count + 6));
    var outer = offsetPolylinePoints(center, band);
    var inner = offsetPolylinePoints(center, -band).reverse();
    return resampleClosedPolygon(outer.concat(inner), count);
  }

  function cross(o, a, b) {
    return (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
  }

  function convexHull(points) {
    var pts = points.map(cleanPoint).sort(function(a, b) {
      return a.x === b.x ? a.y - b.y : a.x - b.x;
    });
    if (pts.length <= 1) return pts;
    var lower = [];
    pts.forEach(function(p) {
      while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
      lower.push(p);
    });
    var upper = [];
    for (var i = pts.length - 1; i >= 0; i--) {
      var p = pts[i];
      while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
      upper.push(p);
    }
    upper.pop();
    lower.pop();
    return lower.concat(upper);
  }

  function hullPolygon(data, count, margin) {
    if (count < 3) return null;
    var pts = data.filter(function(p) { return p.cls === 1; });
    var hull = convexHull(pts);
    if (hull.length < 3) return null;
    var cx = 0, cy = 0;
    hull.forEach(function(p) { cx += p.x; cy += p.y; });
    cx /= hull.length; cy /= hull.length;
    var grown = hull.map(function(p) {
      var dx = p.x - cx, dy = p.y - cy;
      var len = Math.sqrt(dx * dx + dy * dy) || 1;
      return cleanPoint({ x: p.x + margin * dx / len, y: p.y + margin * dy / len });
    });
    return resampleClosedPolygon(grown, count);
  }

  function pointInPolygon(x, y, poly) {
    if (!poly || poly.length < 3) return false;
    var inside = false;
    for (var i = 0, j = poly.length - 1; i < poly.length; j = i++) {
      var xi = poly[i].x, yi = poly[i].y;
      var xj = poly[j].x, yj = poly[j].y;
      var intersect = ((yi > y) !== (yj > y)) &&
        (x < (xj - xi) * (y - yi) / ((yj - yi) || 1e-9) + xi);
      if (intersect) inside = !inside;
    }
    return inside;
  }

  function simpleUnderfitLines(count) {
    return [
      { x1: 0.04, y1: 0.86, x2: 0.86, y2: 0.04 },
      { x1: 0.14, y1: 0.96, x2: 0.96, y2: 0.14 }
    ].slice(0, count);
  }

  function geometryForModel(dataset, data, count, depth, band, solved, centerline, redCenterline) {
    count = Math.max(1, count);
    if (dataset === 'xor' && count >= 2) {
      return { polygon: null, lines: [
        { x1: 0.04, y1: 0.66, x2: 0.66, y2: 0.04 },
        { x1: 0.34, y1: 0.96, x2: 0.96, y2: 0.34 }
      ].slice(0, count) };
    }
    if (dataset === 'linear' || count === 1) {
      return { polygon: null, lineMode: 'halfPlane', lines: [{ x1: 0.04, y1: 0.96, x2: 0.96, y2: 0.04 }] };
    }
    if (dataset === 'moons' || dataset === 'spiral') {
      if (count < 3) {
        return { polygon: null, lineMode: count > 1 ? 'stripe' : 'halfPlane', lines: simpleUnderfitLines(count) };
      }
      if (!solved || (dataset === 'spiral' && depth < 2)) {
        var polygon = hullPolygon(data, count, dataset === 'spiral' ? 0.02 : 0.035);
        return { polygon: polygon, lines: polygonEdges(polygon) };
      }
      var tube = tubePolygon(dataset, data, count, band);
      if (tube) return { polygon: tube, lines: polygonEdges(tube) };
      return { polygon: null, lines: classifierBoundaryLines(data, count, dataset, centerline, redCenterline) };
    }
    return { polygon: null, lineMode: 'halfPlane', lines: [{ x1: 0.04, y1: 0.96, x2: 0.96, y2: 0.04 }] };
  }

  function lookupModel(dataset, data, width, depth) {
    var pieces = effectivePieces(dataset, width, depth);
    var solved = pieces >= requiredPieces(dataset);
    var display = displayPieces(width, depth);
    var band = dataset === 'spiral' ? 0.088 : 0.16;
    var centerCount = Math.max(3, Math.ceil(pieces / 2) + 1);
    if (solved) {
      centerCount = dataset === 'spiral'
        ? Math.max(12, display + 1)
        : Math.max(8, display * 2);
    }
    var centerline = (dataset === 'moons' || dataset === 'spiral') ? sampleClassPath(data, 1, centerCount) : null;
    var redCenterline = (dataset === 'moons' || dataset === 'spiral') ? sampleClassPath(data, 0, centerCount) : null;
    var lookupPoints = (dataset === 'moons' || dataset === 'spiral') && solved ? data : pickPrototypes(data, pieces);
    var geom = geometryForModel(dataset, data, display, depth, band, solved, centerline, redCenterline);
    return {
      kind: 'lookup',
      dataset: dataset,
      width: width,
      depth: depth,
      solved: solved,
      pieces: pieces,
      displayPieces: display,
      lookupPoints: lookupPoints,
      centerline: centerline,
      redCenterline: redCenterline,
      band: band,
      polygon: geom.polygon,
      lineMode: geom.lineMode,
      lines: geom.lines
    };
  }

  // One Adam run: EPOCHS epochs of shuffled mini-batches over CENTER-shifted
  // inputs. Standard backprop for a ReLU stack with a sigmoid + BCE output.
  function runAdam(data, layers, rng) {
    var pts = data.map(function (p) { return { x: [p.x - CENTER, p.y - CENTER], y: p.cls }; });
    var N = pts.length, b1 = 0.9, b2 = 0.999, eps = 1e-8;
    var mW = layers.map(function (L) { return L.W.map(function (r) { return r.map(function () { return 0; }); }); });
    var vW = layers.map(function (L) { return L.W.map(function (r) { return r.map(function () { return 0; }); }); });
    var mb = layers.map(function (L) { return L.b.map(function () { return 0; }); });
